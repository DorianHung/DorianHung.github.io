<script>

  let fontStart = 12, fontEnd = 30, colorStart = '#666', colorEnd = '#000';
  let tags = document.querySelector('#tags').children;
  let counts = [];
  for(let i = 0; i < tags.length; i++) {
    counts.push(tags[i].rel);
  }
  let lowest = Math.min.apply(null,counts), highest = Math.max.apply(null,counts);;
  let range = highest - lowest;
  if (range === 0) {
    range = 1;
  }
  let fontIncr, colorIncr;
  fontIncr = (fontEnd - fontStart) / range;
  
  let sColorArr = toRGB(colorStart), eColorArr = toRGB(colorEnd);

  for(let i = 0; i < tags.length; i++) {
    let disCount = tags[i].rel - lowest;
    let fontSize = fontStart + disCount * fontIncr;
    let style = 'font-size: ' + fontSize + 'px;';
    let arr = [];
    for(let c = 0; c < sColorArr.length; c++) {
      if (disCount === 0) {
        disCount = 1;
      }
      let val = (sColorArr[c] - eColorArr[c]) / range * disCount;
      if (val >= 100) {
        val = eColorArr[c];
      } else if (val <= 0) {
        val = sColorArr[c];
      }
      arr[c] = Math.floor(val);
    }
    style += 'color: ' + toHex(arr);
    tags[i].style = style;
  }

  function toRGB(code) {
    if (code.length === 4) {
      code = code.replace(/(\w)(\w)(\w)/gi, "\$1\$1\$2\$2\$3\$3");
    }
    var hex = /(\w{2})(\w{2})(\w{2})/.exec(code);
    return [parseInt(hex[1], 16), parseInt(hex[2], 16), parseInt(hex[3], 16)];
  }

  function toHex(ary) {
    return "#" + ((1 << 24) + (ary[0] << 16) + (ary[1] << 8) + ary[2]).toString(16).slice(1);
  }

</script>

<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'false'

    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

</script>

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;p&gt;衡量动量最常见的方法是观测&lt;strong&gt;过去12个月到过去1个月这11个月&lt;/strong&gt;的收益状况。&lt;/p&gt;
&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=&#34;katex-display&#34;&gt;&lt;span class=&#34;katex&#34;&gt;&lt;span class=&#34;katex-mathml&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mi&gt;o&lt;/mi&gt;&lt;msub&gt;&lt;mi&gt;m&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mtext&gt;，&lt;/mtext&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mn&gt;100&lt;/mn&gt;&lt;mrow&gt;&lt;mo fence=&#34;true&#34;&gt;[&lt;/mo&gt;&lt;munder&gt;&lt;mo&gt;&lt;mi&gt;Π&lt;/mi&gt;&lt;/mo&gt;&lt;mrow&gt;&lt;mi&gt;m&lt;/mi&gt;&lt;mo&gt;∈&lt;/mo&gt;&lt;mrow&gt;&lt;mo fence=&#34;true&#34;&gt;{&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;mo&gt;−&lt;/mo&gt;&lt;mn&gt;11&lt;/mn&gt;&lt;mo separator=&#34;true&#34;&gt;;&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;mo&gt;−&lt;/mo&gt;&lt;mn&gt;1&lt;/mn&gt;&lt;mo fence=&#34;true&#34;&gt;}&lt;/mo&gt;&lt;/mrow&gt;&lt;/mrow&gt;&lt;/munder&gt;&lt;mrow&gt;&lt;mo fence=&#34;true&#34;&gt;(&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;R&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=&#34;true&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;m&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo&gt;+&lt;/mo&gt;&lt;mn&gt;1&lt;/mn&gt;&lt;mo fence=&#34;true&#34;&gt;)&lt;/mo&gt;&lt;/mrow&gt;&lt;mo&gt;−&lt;/mo&gt;&lt;mn&gt;1&lt;/mn&gt;&lt;mo fence=&#34;true&#34;&gt;]&lt;/mo&gt;&lt;/mrow&gt;&lt;/mrow&gt;&lt;annotation encoding=&#34;application/x-tex&#34;&gt;Mom_{i\text{，}t}=100\left[ \underset{m∈\left\{ t-11;t-1 \right\}}{\varPi}\left( R_{i,m}+1 \right) -1 \right] 
&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=&#34;katex-html&#34; aria-hidden=&#34;true&#34;&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:0.83333em;vertical-align:-0.15em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.10903em;&#34;&gt;M&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34;&gt;o&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34;&gt;m&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.32833099999999993em;&#34;&gt;&lt;span style=&#34;top:-2.5500000000000003em;margin-left:0em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;i&lt;/span&gt;&lt;span class=&#34;mord text mtight&#34;&gt;&lt;span class=&#34;mord cjk_fallback mtight&#34;&gt;，&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.15em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2777777777777778em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mrel&#34;&gt;=&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2777777777777778em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:2.416em;vertical-align:-0.966em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;0&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;0&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.16666666666666666em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;minner&#34;&gt;&lt;span class=&#34;mopen delimcenter&#34; style=&#34;top:0em;&#34;&gt;&lt;span class=&#34;delimsizing size3&#34;&gt;[&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mop op-limits&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.68333em;&#34;&gt;&lt;span style=&#34;top:-2.3089999999999997em;margin-left:0em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;m&lt;/span&gt;&lt;span class=&#34;mrel mtight&#34;&gt;∈&lt;/span&gt;&lt;span class=&#34;minner mtight&#34;&gt;&lt;span class=&#34;mopen mtight delimcenter&#34; style=&#34;top:0em;&#34;&gt;&lt;span class=&#34;mtight&#34;&gt;{&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;span class=&#34;mbin mtight&#34;&gt;−&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mpunct mtight&#34;&gt;;&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;span class=&#34;mbin mtight&#34;&gt;−&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mclose mtight delimcenter&#34; style=&#34;top:0em;&#34;&gt;&lt;span class=&#34;mtight&#34;&gt;}&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span&gt;&lt;span class=&#34;mop&#34;&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathit&#34;&gt;Π&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.966em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.16666666666666666em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;minner&#34;&gt;&lt;span class=&#34;mopen delimcenter&#34; style=&#34;top:0em;&#34;&gt;(&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.00773em;&#34;&gt;R&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.311664em;&#34;&gt;&lt;span style=&#34;top:-2.5500000000000003em;margin-left:-0.00773em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;i&lt;/span&gt;&lt;span class=&#34;mpunct mtight&#34;&gt;,&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;m&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.286108em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mbin&#34;&gt;+&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mclose delimcenter&#34; style=&#34;top:0em;&#34;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mbin&#34;&gt;−&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mclose delimcenter&#34; style=&#34;top:0em;&#34;&gt;&lt;span class=&#34;delimsizing size3&#34;&gt;]&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;实证分析时要求11个月的衡量期内至少有9个月收益可获取，乘以100意为使用百分比形式表示。&lt;br&gt;
&lt;strong&gt;剔除月份t数据的惯例做法是为了将中期动量效应和短期反转效应分离。&lt;/strong&gt;&lt;/p&gt;
&lt;h3 id=&#34;衡量反转&#34;&gt;衡量反转&lt;/h3&gt;
&lt;p&gt;短期反转的衡量方法其实在上文已经提到，股票在t月份的反转因子可以简单记为股票在月份t的收益&lt;br&gt;
​                                                          									                                   	Rev&lt;sub&gt;i,t&lt;/sub&gt; = 100R&lt;sub&gt;i,t&lt;/sub&gt;&lt;/p&gt;
&lt;p&gt;Rev&lt;sub&gt;i,t&lt;/sub&gt;代表短期反转，R&lt;sub&gt;i,t&lt;/sub&gt;代表股票i在月份t的收益，乘以100是为了以百分比形式表示&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;在实证分析中也可能使用小于一个月的数据计算反转效应（比如一周）&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;动量和股票收益&#34;&gt;动量和股票收益&lt;/h3&gt;
&lt;p&gt;使用股票的月度数据进行实证检验是比较简便且快速的方法，但由于聚宽不提供月度数据，在后文A股实证检验动量构建的方法为：调取t-12月到t-1月这11个月的个股&lt;strong&gt;日度（跳过停牌）数据，剔除少于180数据点&lt;/strong&gt;的股票，采用最远时间收盘价（距t-12最近）和最近时间收盘价（距t-1最近）计算期间收益并转为百分比形式。&lt;/p&gt;
&lt;h4 id=&#34;单变量组合分析&#34;&gt;单变量组合分析&lt;/h4&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1615296296646.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;根据&lt;strong&gt;传统动量&lt;/strong&gt;进行单变量组合分析结果如上表所示，市值加权时各组的显著性低于等权重组合，与美股显著的动量效应不同，市值加权和等权重的高减低组合收益数值和显著性都不理想，各组之间也没有展现出单调性，而是呈现出倒U型。&lt;/p&gt;
&lt;p&gt;下面是Bali在进行动量单变量组合分析时得到结论（美股）：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;持有期相同时跳过最后一期构成组合动量的预测能力明显提高&lt;/li&gt;
&lt;li&gt;动量效应在高市值股票中较为显著，低市值股票中较弱（对于最低的5%可能会反转）&lt;/li&gt;
&lt;li&gt;月份t和月份t+1的收益在横截面存在强负相关关系，且在低市值股票上更为明显，反转效应更多&lt;/li&gt;
&lt;li&gt;预测未来k个月的收益：传统的动量Mom作为排序变量时，未来收益存在动量效应且持续10个月（FFα上考虑，尽管7个月后不再异于0），11个月和12个月后的收益却变为负且统计显著&lt;/li&gt;
&lt;li&gt;采用滞后时间计算法对于未来1个月的收益预测能力更强，且滞后时间计算动量没有被反转效应影响&lt;/li&gt;
&lt;/ul&gt;
&lt;h4 id=&#34;双变量组合分析&#34;&gt;双变量组合分析&lt;/h4&gt;
&lt;p&gt;动量效应在单变量组合分析的结果不令人满意，现在控制市值进行双变量独立组合分析，结果如表11.2所示：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1615296303274.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;动量效应仍然不明显，控制市值后各组的高见低组合收益均不显著，有些甚至为负，而反之控制动量后规模效应仍然显著。&lt;/p&gt;
&lt;p&gt;以上是对A股动量效应简单检验的结果，关于A股动量效应必然还有更加深入研究。但从上述结果，若简单以传统动量作为交易策略，无论是纯多头还是多空组合恐怕效果不佳&lt;/p&gt;
&lt;h3 id=&#34;反转和股票收益&#34;&gt;反转和股票收益&lt;/h3&gt;
&lt;p&gt;反转的计算方法已在上文提及，代码整体逻辑与动量类似，计算过去一个月的收益作为Rev。&lt;/p&gt;
&lt;h4 id=&#34;单变量组合分析-2&#34;&gt;单变量组合分析&lt;/h4&gt;
&lt;p&gt;首先进行单变量组合分析，以Rev为排序变量10分组，展示各组以及差异组合的超额收益时间序列均值：&lt;/p&gt;
&lt;p&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1615296336633.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
相比于动量在A股不佳的表现，反转效应十分显著，特别是等权重组合，等权重计算的高减低组合经Newey West调整的t统计量超过了4，各组收益呈现出了不错的单调性，在过去一个月收益高的股票在未来一个月表现为更低的收益率。在Rev最高的几组（即过去一个月收益较高的股票）似乎是造成差异组合显著的主要原因，高Rev组的收益存在一个明显陡降。&lt;/p&gt;
&lt;h4 id=&#34;双变量组合分析-2&#34;&gt;双变量组合分析&lt;/h4&gt;
&lt;p&gt;按照惯例，控制市值继续检验反转效应，结果如下：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1615296342988.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;从表11.4的结果中，非常容易看出，控制市值后低MktCap股票的反转效应非常显著（可以说是目前检验到的最大t值），市值加权组合显著性稍弱一些，随着市值提高差异组合收益的显著性下降，MktCap4和MktCap5之间的差距较大，无论是调整T统计量还是超额收益的数值都有大幅下降，我们可以从中得到结论：&lt;strong&gt;反转在中低市值股票中表现最好&lt;/strong&gt;&lt;br&gt;
考虑各Rev分组，和单变量组合分析类似，高见低组合的差异更像是高Rev造成的，Rev4和Rev5之间有一个明显的跳跃。&lt;br&gt;
总之，控制市值后，反转效应仍然存在且高度显著，最高市值的股票反转效应稍弱一些。&lt;/p&gt;
&lt;h3 id=&#34;动量因子mom与反转因子str&#34;&gt;动量因子MOM与反转因子STR&lt;/h3&gt;
&lt;p&gt;下面是动量和反转因子的构造；&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;在资本资产定价实证研究中最常见的是月度动量因子，构建方法是：&lt;br&gt;
首先按照最近的6月底的市值分成两组LS，随后再依据动量分成三组UMD，最后，用两个U组合未来1个月平均收益减去两个D组合未来1一个月平均收益。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;动量简称为UMD或MOM（大小写区分于股票动量Mom），同SMB,HML一样因子被设计为市值中性的0成本组合。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;反转因子的设计同动量因子相似，根据市值分两组后依据反转值分为三组，形成六个市值加权组合，用两个低反转组合未来一个月平均收益减去两个高反转组合未来一个月的平均收益，记为STR。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;尽管实证支持较强，反转因子的使用频率并不如前述的因子高&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;fama-french和carhart四因子模型&#34;&gt;Fama、French和Carhart四因子模型&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;Carhart（1997）将动量因子引入风险模型中，即FF三因子模型中加入动量因子MOM，它成为了文献中使用最为广泛的标准模型（简称FFC）：&lt;/li&gt;
&lt;/ul&gt;

&lt;p&gt;在此请将历史想象为两个组成部分的总和：一个是不规则组成部分，由无法预知也不遵循任何明显模式的事件组成；另一个是规则组成部分，由长期历史趋势组成。我们在这里考虑的是长期趋势。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;第一条原则。假如一个小改变影响了长期历史趋势，这种影响只能是暂时性的，趋势很快就能逆转回到原来的状态。如果某个小改变看似在长期历史趋势当中取得了长期影响，这只是因为这个改变的方向与大趋势相一致，因此趋势没有得到改变，只是向前推进了一步。 第一原则基本上就是同义反复。假如某个趋势相对小改变而言不够稳定，这一趋势就会随机发展而非追寻特定方向，换句话说就是根本无法成为长期趋势。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;第二条原则。假如一项改变足够大，可以永久改变长期历史趋势，那这项改变必然影响整个社会。换言之，社会体系中的各个部分都是相关的，不可能永久性改变任何重要部分而不改变所有其他部分。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;第三条原则。假如一项改变足够大，可以永久改变长期历史趋势，那么任何人都无法预测社会整体将如何改变。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;第四条原则。新型社会无法从纸面上创造出来。换句话说，你无法提前设计新型社会，并期待该社会在得到建立之后会按照设计来运行。 第三条与第四条原则是人类社会复杂性的结果。人类行为的改变将会影响社会经济与物质环境，经济与环境互为影响，而社会与经济的改变又将以无法预测的方式作用于人类行为。因果律的网络过于复杂，任何人都无法理清并理解。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;第五条原则。人们并不有意识地并理性地选择他们所属社会的形态。是通过社会演化而形成，不受人的理性控制。第五条原则是前四条的结果。&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
">SOME PRINCIPLES OF HISTORY</a>
      </div>
      
      <div class="item">
        <a class="result-title" href="https://dorianhung.github.io/post/shi-zheng-zi-chan-ding-jie-si-jie-zhi-yi-jie/"" data-c="
          &lt;p&gt;本章重点是对价值溢价的实证研究并证明账面市值比和股票期望收益之间的正相关关系&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;价值股和未来收益的相关收益的相关性可以归因为两个变量——市值和权益的账面市值比（Fama and French 1992）；&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;股票期望收益和账面市值比之间的正相关关系研究充满争议，目前两种主要解释为：&lt;br&gt;
1、Fama和French（1993）以及Chen和Zhang（1998）提出的基于风险的解释，价值股更高的收益是由于其对定价风险因素的暴露程度更高；他们的研究表明价值企业通常有较低的收益，较高的收益不确定性和较高的杠杆水平。&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;该理论的支持者认为，经济条件很差，风险溢价很高时，做多价值股并做空成长股的组合的风险很高。Lettau和Ludvigson（2001）的实证研究支持了这一论点：经济下滑时期，相对于成长股的组合收益，价值股的组合收益与消费增长相关性更高。Zhang（2005）从基于生产的资产定价模型中得出此理论，在该模型中，价值股比成长股的风险更高，尤其在经济环境糟糕和风险溢价突增的国家表现更为明显。Fama 和French（1995）发现在此期间，高账面市值比是公司持续盈利能力低的表现。&lt;/p&gt;
&lt;p&gt;2、第二种基于投资者行为的解释；与价值投资相关的收益是由于幼稚的投资者对未来增长的预期导致的错误定价所带来的。价值股的高收益是由投资者错误估计企业未来收益增长导致的错误定价造成的，幼稚的投资者往往过分依据以往的增长情况来估计未来增长，幼稚的投资者对过去表现非常好的股票过于乐观，创造了对这种股票的需求，导致这些魅力股票的定价过高。类似地，幼稚的投资者往往对过去表现较差的股票过度反应，过度地抛售，导致这些价值股的定价过低。&lt;/p&gt;
&lt;p&gt;到底反转策略能产生高收益是因为股票被错误定价，还是因为价值股的基本风险高于成长股，目前还没有定论&lt;/p&gt;
&lt;h2 id=&#34;计算账面市值比&#34;&gt;计算账面市值比&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;账面市值比记为BM，定义为公司普通股账面价值BE除以公司权益市场的价值ME&lt;/p&gt;
&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=&#34;katex-display&#34;&gt;&lt;span class=&#34;katex&#34;&gt;&lt;span class=&#34;katex-mathml&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;B&lt;/mi&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mfrac&gt;&lt;mrow&gt;&lt;mi&gt;B&lt;/mi&gt;&lt;mi&gt;E&lt;/mi&gt;&lt;/mrow&gt;&lt;mrow&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mi&gt;E&lt;/mi&gt;&lt;/mrow&gt;&lt;/mfrac&gt;&lt;/mrow&gt;&lt;annotation encoding=&#34;application/x-tex&#34;&gt;BM=\frac{BE}{ME}
&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=&#34;katex-html&#34; aria-hidden=&#34;true&#34;&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:0.68333em;vertical-align:0em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.05017em;&#34;&gt;B&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.10903em;&#34;&gt;M&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2777777777777778em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mrel&#34;&gt;=&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2777777777777778em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:2.04633em;vertical-align:-0.686em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mopen nulldelimiter&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mfrac&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:1.36033em;&#34;&gt;&lt;span style=&#34;top:-2.314em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.10903em;&#34;&gt;M&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.05764em;&#34;&gt;E&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.23em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;frac-line&#34; style=&#34;border-bottom-width:0.04em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.677em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.05017em;&#34;&gt;B&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.05764em;&#34;&gt;E&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.686em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mclose nulldelimiter&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;其中账面价值取自公司资产负债表，市场价值和公司市值相同，由于BM高度右偏（参考市值）为了最小化数据分析中BM极端影响，使用BM的自然对数lnBM&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;BE的计算开始于股东权益的账面价值，书中加上了递延税和投资税收抵免修正了税收效应对价值的影响，最后再从中减去优先股的账面价值&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;BE的计算结果可能为负，数据处理时会舍去这些数据&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;计算市场权益通常使用的是市场价值，即任意指定年份12月的流通股数量乘以价格&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;最后，匹配BE和ME的时间。最标准的方法是Fama和French的做法：第y个财年年底的数据计算的账面净值和同一年y年底计算的市场价值进行匹配（对于每年1月作为会计年底的公司，账面净值将于给定年度1月底进行计算，市场价值将于同年12月底计算，即时间差最多11个月）&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;因为计算年份y账面市值比所用的数据在y+1年6月才公布，为了确保数据可以公开获取，年份y+1的6月到年份y+2的5月的BM使用年份y数据计算而得&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;strong&gt;即年度y+1的6月到年度y+2的5月期间月份t的账面市值比，可以看作每个自然年度y年底的权益账面价值除以年度y年底即12月的市场价值。&lt;/strong&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;描述性统计等结论bali的实证结论&#34;&gt;描述性统计等结论（Bali的实证结论）&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;BM具有非常明显正偏态分布，也有肥尾特性&lt;/li&gt;
&lt;li&gt;有效且能获得的BM比β和MktCap少，缺失值较多&lt;/li&gt;
&lt;li&gt;BM和lnBM的皮尔逊积矩相关系数非常高（斯皮尔曼为1）BM和市场贝塔，股票规模是负相关的&lt;/li&gt;
&lt;li&gt;BM和lnBM有比较显著的持续性，即使滞后期到了5年持续性也很高。在所有滞后期中lnBM的持续性都比BM略高&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;价值因子fama和french三因子模型&#34;&gt;价值因子，Fama和French三因子模型&lt;/h2&gt;
&lt;p&gt;Fama 和 French构建了一个0成本组合，持有高账面市值比的股票多头头寸和低账面市值比的空头头寸，并把这个组合成为HML&lt;/p&gt;
&lt;p&gt;FF风险模型常被用于评估组合是否产生不是由于对风险因素敏感所得的平均收益，三因子模型包含三个风险因子：MKT，SMB，HML。这些组合中的每一个收益旨在代替与获取一个给定风险相关的收益，同时与其他风险有最少的接触&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;如果α统计上异于0，表明组合产生超额收益且不是对市场，规模和价值因素的敏感性产生&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;账面市值比和股票收益&#34;&gt;账面市值比和股票收益&lt;/h2&gt;
&lt;p&gt;在这个部分我将在A股上检验价值效应。&lt;br&gt;
在实践中，用于计算BM的分子BE和分母ME，采用不同处理方法时对结果会产生较大的影响：例如Bali的实证资产定价在计算分母ME时选用了&lt;strong&gt;流通市值&lt;/strong&gt;，而因子投资方法与实践一书则采用了&lt;strong&gt;总市值&lt;/strong&gt;；对应地，前者的分母BE计算方法为：&lt;strong&gt;BE = SEQ（股东权益）+TXDB（延递税）+ITCB（投资税收抵免）-BVPS（优先股账面价值）&lt;/strong&gt;，后者的分母BE计算方法为&lt;strong&gt;总股东权益-少数股东权益&lt;/strong&gt;。从BM的计算结果看，前者得出的BM会比后者大。另一方面，计算分子和分母的时间需要统一匹配，我选用的方法为：市值选用最新数据；对于来自资产负债表的数据，t年5月后的股东权益选用上一年的年报数据，t年5月前的股东权益选用上两年的年报数据。&lt;/p&gt;
&lt;p&gt;考虑到数据获取的便利程度以及对美国延递税等的不了解，后文的实证检验将采用因子投资方法与实践的BM计算方法（&lt;strong&gt;除去少数股东权益的总股东权益/总市值&lt;/strong&gt;），而在&lt;strong&gt;双变量排序和权重计算中仍然沿用Bali的方法——采用流通市值作为排序变量以及市值权重&lt;/strong&gt;。&lt;/p&gt;
&lt;p&gt;本章是到目前A股实证检验部分踩坑最多的一章（可能还存在暂时未知的数据处理问题），最后我将观察价值因子HML最近20年的表现，并尝试简单复制Liu et al.2019采用EP代替BM的方法再次对A股进行检验。&lt;/p&gt;
&lt;h3 id=&#34;1-单变量组合分析&#34;&gt;1、 单变量组合分析&lt;/h3&gt;
&lt;p&gt;根据BM排序而形成十分位数组合进行单变量组合分析，结果如表10.1所示&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1614917806222.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;首先看10-1组合：在市值加权组合下，并没有检测出显著的价值溢价，高减低组合的经Newey West调整的T统计量仅为0.91；在等权重组合中，高减低组合的经Newey West调整的T统计量为2.07，在统计上显著。&lt;br&gt;
再观察单调性：市值加权组合的第6到第10十分位收益单调递增，在BM较低组合则不明显；等权重组合从第1十分位到第10十分位的收益则呈现了更好的单调性，从第1十分位到第8十分位满足单调递增，最后的8，9，10十分位大体收益相近。&lt;/p&gt;
&lt;h3 id=&#34;2-双变量组合分析&#34;&gt;2、双变量组合分析&lt;/h3&gt;
&lt;p&gt;接下来将MktCap（流通市值）作为第二个排序变量，通过双变量独立排序进一步检测A股的价值溢价效应。根据市值和BM将股票各分为5组，一共形成25个组合，采用市值加权和等权重方法分别计算组合超额收益，结果如表10.2所示：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1614918169342.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;无论是从表中的A部分还是B部分都可以发现，市值最大组（MktCap5）的BM差异组合无论是超额收益的数值还是显著性，相比于其他组合都是最低的（Bali在美股的检验中也发现了相同现象），市值加权下最大市值组的BM5-1组合经Newey West调整t统计量为0.55，等权重组合为0.49，在统计上均不显著异于0，总体的趋势为：市值越小的股票价值效应越显著，且只有MktCap1和MktCap2的BM5-1组合在统计上显著。&lt;br&gt;
市值加权和等权重组合产生的结果是类似的，因为市值本身是排序变量，每个组合中股票的市值是相似的，所以采用市值加权不会带来很大影响。&lt;br&gt;
最后，在加入了市值为排序变量进行双变量独立排序分析后，&lt;strong&gt;得出了价值效应只存在于中小市值股票中的结论。&lt;/strong&gt;&lt;/p&gt;
&lt;h3 id=&#34;1053-fama和macbeth回归分析&#34;&gt;10.5.3 Fama和MacBeth回归分析&lt;/h3&gt;
&lt;p&gt;现在用FM回归继续检验BM和股票未来收益的关系，考虑到BM和Size分布的高偏度，将BM和市值取对数作为回归自变量，结果如表10.3所示：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1614918895391.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;列（1）使用lnBM作为唯一自变量；回归得到lnBM的平均斜率系数为1.21，经Newey West调整T统计量为1.79；列（2）使用lnBM和Size作为自变量；这时lnBM平均斜率为1.28，经Newey West调整T统计量为2.18；Size平均斜率为-0.45，且显著的与收益呈现负相关关系；列（3）使用lnBM和β作为自变量；lnBM的显著性相比前两组下降，β平均斜率和统计性表现均较差；列（4）使用lnBM，β和Size作为自变量，lnBM和Size的数值均有统计意义，β仍没有表现出明显的和收益的关系。&lt;/p&gt;
&lt;p&gt;在四组FM回归中，lnBM和未来收益均表现了正向关系，Size为负向关系且十分显著，β平均斜率为负，但平均斜率和t值都很小。&lt;/p&gt;
&lt;h2 id=&#34;ep和股票收益&#34;&gt;EP和股票收益&lt;/h2&gt;
&lt;p&gt;接下来参考Liu et al.2019采用EP代替BM的方法对A股进行检验，在下文的检验中采用简化的数据处理方法：①对PE取倒数，舍去负值得到EP代替BM进行排序、回归；②剔除市值最小的30%的股票（在FM回归时只对市值上限0.5%水平进行缩尾所谓）&lt;br&gt;
论文中对此的解释大体可以概括为：①选用EP作为价值代理是根据“赛马”结果得出的；②由于A股借壳上市的存在，需要剔除市值最小的30%的股票（壳公司特点），因为这些公司的基本面数据不能用于预测未来收益。&lt;/p&gt;
&lt;h3 id=&#34;组合分析&#34;&gt;组合分析&lt;/h3&gt;
&lt;p&gt;单变量组合分析（表10.4）及双变量组合分析（表10.5）的结果如下所示：&lt;br&gt;
&lt;img src=&#34;https://dorianhung.github.io/post-images/1614936010010.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;4&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1614936037538.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;使用EP代替BM后，在单变量组合分析中，EP各分组展现出了较好的单调性，高减低组合在市值加权和等权重组中均统计上显著；在加入市值作为排序变量的双变量独立中，与BM类似，市值最大的股票EP5-1组合显著性最弱，但EP5-1组合在不同的市值统计上均表现出显著，总之，选用EP检测出了更强的价值溢价。&lt;/p&gt;
&lt;h3 id=&#34;fm回归&#34;&gt;FM回归&lt;/h3&gt;
&lt;p&gt;接下来同样进行FM回归，结果如表10.6：&lt;br&gt;
&lt;img src=&#34;https://dorianhung.github.io/post-images/1614936041929.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
列1~4的排序方法和BM一致，从各列结果可以发现EP和未来收益表现为正向关系，加入Size作为回归变量后EP的平均斜率更加显著，相比BM，Size的显著性弱一些；同时，在回归系数的时间序列运用describe()函数（未在表中给出）也可以发现，EP平均斜率系数很大且在时间序列上存在极端值，最大和最小EP斜率系数的差距非常夸张，从经济意义上不能得出常理之内的结论。&lt;/p&gt;
&lt;p&gt;当然，需要重申的是这里对论文的复刻非常不严谨，仅仅参考了作者的思路进行非常简单的实证检验（后续待补充），上述FM回归得到了标准差非常大的EP斜率系数，组合分析结果显著性不如论文中所述，尽管如此，我们也能隐约发现EP代替BM后的表现确实不错；论文的Introduction部分写道“&lt;strong&gt;在中国复制美国模式是值得商榷的，两国环境的差异应决定了独特的探索方法”&lt;/strong&gt;，对于做到目前为止的读书笔记中A股实证检验，给予了我一定的提醒与启发。&lt;/p&gt;
&lt;p&gt;最后，让我们观察价值因子HML在A股最近二十年的表现，（数据源于factorwar.com，频率为月度）:&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-python&#34;&gt;FF5 = pd.read_csv(&#39;Fama-French-5factors.csv&#39;)
#时间序列处理
FF5[&#39;date&#39;] = pd.to_datetime(FF5[&#39;date&#39;]) 
FF5 = FF5.set_index(&#39;date&#39;)

FF5[&#39;2000&#39;:&#39;2020&#39;][&#39;HML&#39;].plot()
&lt;/code&gt;&lt;/pre&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;5&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1613736597427.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;HML因子平均收益率在过去二十年为0.0077、2000年到2010年为0.0150、而2010年到2020年为-0.0025；以2000年为起点，十年为窗口遍历HML因子（月度）并用t检验其是否显著异于0，从2005年开始，即2005-2015，除去2007-2017，HML不显著异于0，其中2010-2020的t值仅为-0.38。这似乎可以得出一条模糊的结论：&lt;strong&gt;2000年到2010年这十年的价值因子表现优于2010年到2020年，且后者的表现差强人意。&lt;/strong&gt;&lt;/p&gt;

        <a class="result-title" href="https://dorianhung.github.io/post/shi-zheng-zi-chan-ding-jie-san-gui-mo-xiao-ying/"" data-c="
          &lt;p&gt;规模效应是指大市值股票的收益常常比小市值收益低。&lt;/p&gt;
&lt;p&gt;Fama和French（1992）关于规模效应的主要结论是：市值有预测未来股票横截面收益的能力，特别的，小市值股票获得显著高于大市值股票的平均历史收益；Fama和French（1993）设计并构造了一个组合，该组合的收益拟合了与规模效应相关的收益，他们进一步提出将这个组合的收益作为一个风险因子，记为SMB（小减大）&lt;/p&gt;
&lt;h2 id=&#34;计算市值&#34;&gt;计算市值&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;市值定义为所有流通股的总价值（发行的股份总数乘以单股价格）&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;计算市值最简单的办法是测算期期末（如月末）的股票价格和流通股数量；另一种是Fama和French计算方法：y年6月最后一个交易日数据计算市值并保持到y+1年的6月最后一个交易日（美股年报），优点在于市值不受到股价短期波动影响。但以上两种方法对结果产生的影响都微乎其微。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;市值的横截面分布是【高度偏态分布】，一小部分股票的市值非常大，为了避免极端值常用市值的自然对数（记为Size）作为变量&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;分析时间跨度大时，通胀导致市值的解释随时间而改变，为了使不同时期的实证分析结果可比较，通常需要对市值的度量进行通胀调整&lt;/p&gt;
&lt;p&gt;如：以2012年为标准进行调整&lt;/p&gt;
&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=&#34;katex-display&#34;&gt;&lt;span class=&#34;katex&#34;&gt;&lt;span class=&#34;katex-mathml&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mi&gt;k&lt;/mi&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;a&lt;/mi&gt;&lt;msubsup&gt;&lt;mi&gt;p&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=&#34;true&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;mrow&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;P&lt;/mi&gt;&lt;mi&gt;I&lt;/mi&gt;&lt;/mrow&gt;&lt;/msubsup&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mi&gt;k&lt;/mi&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;a&lt;/mi&gt;&lt;msub&gt;&lt;mi&gt;p&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=&#34;true&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo&gt;∗&lt;/mo&gt;&lt;mfrac&gt;&lt;mrow&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;P&lt;/mi&gt;&lt;msub&gt;&lt;mi&gt;I&lt;/mi&gt;&lt;mrow&gt;&lt;mn&gt;12&lt;/mn&gt;&lt;mi mathvariant=&#34;normal&#34;&gt;/&lt;/mi&gt;&lt;mn&gt;2012&lt;/mn&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;/mrow&gt;&lt;mrow&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;P&lt;/mi&gt;&lt;msub&gt;&lt;mi&gt;I&lt;/mi&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/msub&gt;&lt;/mrow&gt;&lt;/mfrac&gt;&lt;/mrow&gt;&lt;annotation encoding=&#34;application/x-tex&#34;&gt;MktCap_{i,t}^{CPI}=MktCap_{i,t}*\frac{CPI_{12/2012}}{CPI_t}
&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=&#34;katex-html&#34; aria-hidden=&#34;true&#34;&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:1.274439em;vertical-align:-0.383108em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.10903em;&#34;&gt;M&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.03148em;&#34;&gt;k&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34;&gt;t&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.07153em;&#34;&gt;C&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34;&gt;a&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34;&gt;p&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.891331em;&#34;&gt;&lt;span style=&#34;top:-2.4530000000000003em;margin-left:0em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;i&lt;/span&gt;&lt;span class=&#34;mpunct mtight&#34;&gt;,&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.1130000000000004em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34; style=&#34;margin-right:0.07153em;&#34;&gt;C&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34; style=&#34;margin-right:0.13889em;&#34;&gt;P&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34; style=&#34;margin-right:0. an&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.286108em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mbin&#34;&gt;∗&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:2.2645299999999997em;vertical-align:-0.8360000000000001em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mopen nulldelimiter&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mfrac&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:1.4285299999999999em;&#34;&gt;&lt;span style=&#34;top:-2.3139999999999996em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.07153em;&#34;&gt;C&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.13889em;&#34;&gt;P&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.07847em;&#34;&gt;I&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.2805559999999999em;&#34;&gt;&lt;span style=&#34;top:-2.5500000000000003em;margin-left:-0.07847em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.15em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.23em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;frac-line&#34; style=&#34;border-bottom-width:0.04em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.7451999999999996em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.07153em;&#34;&gt;C&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.13889em;&#34;&gt;P&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.07847em;&#34;&gt;I&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.34480000000000005em;&#34;&gt;&lt;span style=&#34;top:-2.5198em;margin-left:-0.07847em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;2&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;/&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;2&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;0&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.3551999999999999em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.8360000000000001em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mclose nulldelimiter&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;规模和股票收益&#34;&gt;规模和股票收益&lt;/h2&gt;
&lt;p&gt;接下来在A股实证检验规模效应，在上一章的基础上，本章进行了双变量独立组合分析，另一个排序变量为贝塔，在FM回归中也将贝塔放入了等式右边。&lt;br&gt;
JoinQuant通过如下代码获取流通市值，在权重计算时使用的同样是此流通市值。&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;get_fundamentals(query(valuation).filter(
      valuation.code.in_(stkdf[&#39;code&#39;].tolist())), date=time_now
                      )[[&#39;code&#39;,&#39;circulating_market_cap&#39;]]   
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在计算断点方面，Bali提到了来自NYSE交易所的股票市值平均比其他交易所大，如果采用全市场计算断点则会有效分离NASDAQ,NYSE,AMEX的股票（因此他选用NYSE股票计算断点）；在下文的A股检验中，断点由股票池（即剔除了ST，次新股的全A股）计算。&lt;/p&gt;
&lt;h3 id=&#34;1-单变量组合分析&#34;&gt;1、单变量组合分析&lt;/h3&gt;
&lt;p&gt;表9.1为单变量组合分析的结果，每月形成10个分位组合，流通市值作为排序变量，毫无疑问各组市值是高度偏态的，第10十分位市值在时间序列上的均值约为第9十分位组的3倍，最大组约的平均市值是其余各组均值之和的两倍（描述性统计结果未贴出）&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1615042831890.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;表中结果显示，做多高市值股票做空低市值股票的差异组合无论是采用市值加权，还是等权重都产生了显著的负平均收益率；&lt;br&gt;
值得注意的是，在采用市值加权计算收益时，市值不仅作为排序变量，也作为权重，市值加权组10-1组合的显著性和收益均低于等权重组合；&lt;br&gt;
通过观察1~10分位组合，A股市场和美股市场展现出了类似的结果：收益随着市值上升而递减，最低市值的股票具有最高的超额收益，且显著性强；再考虑到市值加权和等权重表现的上述差别，&lt;strong&gt;市值和股票未来收益之间的横截面关系似乎是由样本中市值最低的股票的高超额收益驱动的。&lt;/strong&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;如果规模效应是由极小市值的一部分股票驱动，这些股票可能存在流动性不足的问题，从而使得旨在捕捉基于规模的策略实施相当困难。&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;2-双变量组合分析&#34;&gt;2、双变量组合分析&lt;/h3&gt;
&lt;p&gt;现在用双变量组合继续检验规模和收益之间的关系，引入变量贝塔，观察控制市场贝塔后市值和股票收益的关系，根据贝塔和市值把股票各独立分成5组，一共形成25个组合。&lt;br&gt;
理论上，高贝塔股票应该具有高的期望收益，考虑到市值低的股票常常具有低贝塔值，所以没有理论可以期望β能解释极低市值的股票会有高收益这一现象。然而在上一章中，我们发现了β和未来收益的负向关系，那么也许控制β能解释规模效应？检验结果如下表所示：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1615042841638.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;贝塔的各分组中均发现了规模效应，无论是采用市值加权还是等权重，从差异组合的t统计量可以得知等权重产生的规模效应更强；另外，对于市值的各分组中，和上一章一样同样没有发现高贝塔会带来更高的收益。&lt;/p&gt;
&lt;p&gt;P.S.在Bali的例中，采用&lt;strong&gt;NYSE计算断点&lt;/strong&gt;和采用&lt;strong&gt;全市场计算断点&lt;/strong&gt;的双变量组合分析结果有差异，NYSE计算断点时只在贝塔最低组中检测出了显著规模效应（由此得出结论规模效应集中在低市场贝塔的股票中），采用全市场时规模效应在各组的收益率和显著性明显提升，但低贝塔组的MktCap5-1收益率t值仍比其他组更高&lt;/p&gt;
&lt;p&gt;###3、Fama和MacBeth回归分析&lt;br&gt;
现在我们用FM回归来检验规模效应，每个月用规模或规模与贝塔对未来1个月的股票平均超额收益进行横截面回归。在进行回归时为了避免极端的市值造成影响采用Size（流通市值取对数）作为解释变量。&lt;br&gt;
表9.3呈现了FM回归分析的结果&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1615042853100.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;列（1）显示，Size为唯一自变量时，截面回归月平均斜率为-0.42，Newey West调整T统计量为-2.60，表明Size和股票未来收益之间存在统计上显著的负相关关系。&lt;br&gt;
列（2）显示，控制β影响后，Size的平均斜率为-0.45，Newey West调整T统计量为-3.05，规模和股票未来收益之间负横截面关系仍然存在，β平均斜率为-0.13，调整T统计量为0.11。&lt;/p&gt;
&lt;p&gt;检测列2在经济上的显著性，通过describe()函数得到回归自变量的描述性统计，如下表所示。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;4&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1615042968758.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;将包含控制变量β的回归方程式中Size的平均斜率系数-0.45乘以标准差2.17得到-0.97，这表明其他条件相同时，Size的一个标准差偏差带来每月0.98%的股票期望收益差额，数值具有经济意义，此外还可以用75分位和25分位的差额乘以平均斜率系数，结果显然在经济上是有的。&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;总结：&lt;/strong&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;市值和股票期望收益之间的负相关关系很大程度上取决于分析使用方法，如采用市值加权计算/等权重计算，计算断点的方式也会产生影响；&lt;/li&gt;
&lt;li&gt;规模效应由市值最低十分位数组合中的股票的极大收益驱动；&lt;/li&gt;
&lt;li&gt;组合收益和FM回归分析都检测出了规模和未来收益的显著的负相关关系，控制了β之后二者关系依然存在，它和CAPM的预测矛盾（可能的解释：市值可能作为暴露于&lt;strong&gt;不包括在基准资产定价模型CAPM的风险的代理&lt;/strong&gt;或市场无效）&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;规模因子&#34;&gt;规模因子&lt;/h2&gt;
&lt;p&gt;考虑到市值是股票暴露在一个可定价但以前未定义的风险因素，Fama和French创建了一个0成本多空组合SMB，&lt;strong&gt;旨在产生一个收益近似于与该位置规模因子一个单位风险相关联的收益，且对其他因子敏感性很小&lt;/strong&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;在y年6月，根据所有股票市值中值分成S组和B组；&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;在y年6月，根据账面市值比（BM）独立分为三组，BM等于y-1年的财年年底普通股账面价值除以y-1年12月底的股票市值，H组包含BM高于70百分位数的股票，M组包含30，70百分位数之间的股票，L组包含低于30百分位的股票&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;两个市值组和三个BM组形成6个组合，六个组合中每个组合中股票市值加权（y年6月底计算），计算6个组合y年7月到y+1年6月的月收益率，其中每个月都会重新构造组合&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;strong&gt;模拟规模因子的组合（SMB）在任一月m的收益等于：三个低市值组合（S/H，S/M，S/L）的收益简单平均值减去三个高市值股票（B/H，B/M，B/L）组合收益的简单平均值，该组合设计的目的是创建一个多空组合，其收益率对高市值股票和低市值股票之间的收益差异非常敏感，并且对高和低账面市值比股票之间的收益率差异相对不敏感&lt;/strong&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;

t;&lt;span style=&#34;top:-2.5500000000000003em;margin-left:-0.05278em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;i&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.15em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.16666666666666666em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;minner&#34;&gt;&lt;span class=&#34;mopen delimcenter&#34; style=&#34;top:0em;&#34;&gt;(&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.05764em;&#34;&gt;E&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.16666666666666666em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;minner&#34;&gt;&lt;span class=&#34;mopen delimcenter&#34; style=&#34;top:0em;&#34;&gt;[&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.00773em;&#34;&gt;R&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.28055599999999997em;&#34;&gt;&lt;span style=&#34;top:-2.5500000000000003em;margin-left:-0.00773em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;m&lt;/span&gt;&lt;span class=&#34;mpunct mtight&#34;&gt;,&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34 &lt;p&gt;其中r是股票i在时段t内的&lt;strong&gt;超额收益&lt;/strong&gt;，MKT是市场组合(市场因子)在时段t内的超额收益，ε是回归残差。如果α为0，两边取期望则得到CAPM，股票市场β则可以看作回归结果中斜率系数的估计值&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;估计市场β可以采用不同的数据频率和周期，常用的方法是&lt;strong&gt;一年的日度超额收益&lt;/strong&gt;估计上式（t-11到t共&lt;strong&gt;12个月&lt;/strong&gt;日度数据），这种情况下至少需要200个数据点。如果采用月度数据，常用过去5年的月度超额收益。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;Bali的实证结论：测量周期变长，贝塔估计值的标准差变小（异常值影响变小），意味着可能接近贝塔的真实值；此外，更多的数据点导致样本偏向更大更成熟的公司；最后，较长周期测量测量间的相关系数更大（短周期噪声更大）&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;贝塔和股票收益&#34;&gt;贝塔和股票收益&lt;/h2&gt;
&lt;p&gt;根据CAPM的预测，市场贝塔和股票期望收益之间存在正相关关系，且这个斜率表示市场风险溢价。而在Bali书中对美股的实证检验中没有得出上述结论——组合分析，回归分析都&lt;strong&gt;没有&lt;/strong&gt;检测到贝塔和未来收益的显著关系，那么对于A股情况如何呢？接下来为A股对贝塔的实证检验。&lt;br&gt;
计算贝塔的步骤与上述过程大体一致，月度和日度MKT和无风险利率的数据取自factorwar.com，使用过去一年的日度收益对MKT回归；从实践过程发现，若用至少200个数据点的要求计算贝塔会导致较多的缺失值，因此条件放宽至&lt;strong&gt;至少165个数据点&lt;/strong&gt;。&lt;br&gt;
此外，在本章的实证检验中仅采用贝塔作为排序或回归变量，这是因为贝塔在后续章节中将继续登场，为了避免重复而没有引入其他变量。&lt;/p&gt;
&lt;h3 id=&#34;1组合分析&#34;&gt;1.组合分析&lt;/h3&gt;
&lt;p&gt;以贝塔为排序变量研究单变量排序组合，结果如表8.1所示&lt;br&gt;
&lt;img src=&#34;https://dorianhung.github.io/post-images/1613637269014.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;结果表明，无论以市值加权或等权重计算收益，所有十分位上都&lt;strong&gt;没有&lt;/strong&gt;呈现出明显的单调性，但平均收益最低的总是第10分位组合（与CAPM矛盾），市值加权和等权重计算的高减低组合平均收益率为负数；采用等权重计算时，贝塔和股票收益负向关系更弱（表现在高减低组合的平均收益率绝对值更低，显著性更低）；总之，在A股的实证检验得出的结论与Bali在美股相似，&lt;strong&gt;贝塔和期望收益的正相关关系没有被发现（反而存在一定的负相关）。&lt;/strong&gt;&lt;/p&gt;
&lt;h3 id=&#34;2fm回归&#34;&gt;2.FM回归&lt;/h3&gt;
&lt;p&gt;接下来采用FM回归分析研究贝塔和股票收益关系，每个月对每种贝塔进行测量，用未来一个月股票超额收益对贝塔横截面回归，回归得到系数时间序列，通过describe()函数进行描述性统计，最后整理导出如表8.2所示：&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;1&#34;&gt;&lt;img src=&#34;https://dorianhung.github.io/post-images/1614941640822.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;贝塔的平均系数为负数经Newey West调整T统计量为-0.11，与CAPM矛盾，此外回归得到截距系数非常大，且在统计上显著，与CAPM的第二个预测，即零贝塔证券期望超额收益为零相矛盾；考虑其经济意义，用平均斜率系数-1.02乘以标准差5.10得到-5.20，β每增加一个标准差期望收益每月减少5.20%，数值经济上有意义。&lt;/p&gt;
&lt;p&gt;与CAPM矛盾的实证检测结果是最持久且最被广泛研究的异象，对此Bali在书中提到的解释有：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;机构投资者基准行为引起（Baker、Bradley和Wurgler 2011）&lt;/li&gt;
&lt;li&gt;受杠杆约束投资者会买多高β股票以增加组合期望收益，结果是高贝塔股票价格升高从而降低期望收益（Frazzini和Pedersen 2014）&lt;/li&gt;
&lt;li&gt;投资者对博彩型股票的需求，这些股票恰好是高贝塔股票，结果使高贝塔股票价格升高从而降低期望收益（Bali、Brown、Murray和Tang 2014）&lt;/li&gt;
&lt;/ul&gt;
">实证资产定价(二)贝塔</a>
      </div>
      
      <div class="item">
        <a class="result-title" href="https://dorianhung.github.io/post/shi-zheng-zi-chan-ding-jie-1-yu-bei-zhi-shi/"" data-c="
          &lt;p&gt;本系列是基于《Empirical Asset Pricing》及《因子投资方法与实践》的读书笔记集合，旨在加深对实证资产定价的方法论的理解并尝试运用书中于A股实证检验。本篇将简要实证资产的预备知识，对应Empirical Asset Pricing的前七章内容。&lt;/p&gt;
&lt;h2 id=&#34;1样本&#34;&gt;1.样本&lt;/h2&gt;
&lt;h3 id=&#34;11样本和数据&#34;&gt;1.1样本和数据&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;公式中的个体（指股票）用i来表示，时间用t（年，月等）表示；&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;后续针对A股实证部分：股票价格，财务信息等数据来自聚宽（JoinQuant.com），无风险收益和因子模型等数据来自factorwar.com，通过python实现回归、统计等检验。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;聚宽提供了2005至今的股票数据，对股票池的处理为：剔除了上市不满一年的次新股，剔除ST股，另外计算贝塔时剔除过去一年中可获得数据少于160的股票&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;检验开始日期为2006年1月25日，结束日期为2020年12月21日，除了计算贝塔时采用日度数据，其余均为月度数据&lt;/p&gt;
&lt;p&gt;聚宽主要数据调用时的参数设定：&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;pre&gt;&lt;code class=&#34;language-python&#34;&gt;#获取指定日期所有A股，返回股票代码，上市时间，退市时间等的dataframe
 stk = get_all_securities(types=[&#39;stock&#39;], date=date)
    
#获取时间段内的股价信息
get_price(Astock #包含多只股票代码的list
                      , start_date = beginDate
                      , end_date = endDate
                      , frequency=&#39;daily&#39;   #最低频率为日度价格数据
                      , fields=[&#39;pre_close&#39;,&#39;close&#39;]  
                      , skip_paused=True #是否跳过停牌股票，计算未来一个月的收益时会改为False
                      , fq=&#39;post&#39;#后复权
                      , panel=False)

#财务数据：
#获取市值数据（valuation表）下例为流通市值（100 000 000），返回columns为代码和市值的datraframe
get_fundamentals(query(valuation).filter(
      valuation.code.in_(stk_list)), date = date
                      )[[&#39;code&#39;,&#39;circulating_market_cap&#39;]]   

#获取资产负债数据（balance表），下例为股东权益，返回columns为代码和股东权益的datraframe
get_fundamentals(query(balance).filter(
    balance.code.in_(stk_list)), statDate = year
                      )[[&#39;code&#39;,&#39;total_owner_equities&#39;]]   

&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;P.S.聚宽数据库提供了个股部分因子数据，但其标准化处理方式与传统方法不同，在后文的A股实证检验中我将使用传统的方法对数据进行计算和标准化。&lt;/p&gt;
&lt;h3 id=&#34;2缩尾和截尾&#34;&gt;2.缩尾和截尾&lt;/h3&gt;
&lt;p&gt;为了排除极端数据对结果的影响通常会对其进行处理，常用的方法有如下两种：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;缩尾：高于或低于某特定百分位的极端值被赋值为该特定百分位的值。如取h=l=0.5%，则99.5百分位数和0.5百分位数以外的数字被赋值为百分位对应的数。&lt;br&gt;
-截尾：百分位数外的数据设定为缺失（舍去）&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;对于后续的A股实证检验，对横截面的极端值如无特殊说明则采用如下默认处理方式：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;进行组合分析时进行0.5%水平的截尾&lt;/li&gt;
&lt;li&gt;进行FM回归时考虑代码的使用winsorize函数进行上下0.5%水平的缩尾&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;3newey-west调整&#34;&gt;3.Newey West调整&lt;/h3&gt;
&lt;p&gt;经典线性模型假设随机扰动项独立，同方差，但在广义线性回归中，这两个假设均可以被打破从而得到两个常见的特性：异方差和自相关。&lt;br&gt;
对此Newey和West（1987）提出了方法来解决异方差和自相关性对P值或T统计量的影响&lt;br&gt;
Newey和West调整所需要唯一的变量输入是调整时用到的滞后期数，计量经济学软件通常设定滞后期为4(T/100)^a ，T是时间序列时段的个数，a=2/9或4/25&lt;/p&gt;
&lt;h3 id=&#34;4期间横截面相关系数&#34;&gt;4.期间横截面相关系数&lt;/h3&gt;
&lt;p&gt;①pearson积矩相关系数：线性关系强度&lt;/p&gt;

t;&lt;span class=&#34;mbin&#34;&gt;−&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;1&lt;/span&gt;&lt;span class=&#34;mclose delimcenter&#34; style=&#34;top:0em;&#34;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.23em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;frac-line&#34; style=&#34;border-bottom-width:0.04em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.6769999999999996em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:3em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord&#34;&gt;6&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathit&#34;&gt;Σ&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.746292em;&#34;&gt;&lt;span style=&#34;top:-2.4231360000000004em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;i&lt;/span&gt;&lt;span class=&#34;mrel mtight&#34;&gt;=&lt;/span&gt;&lt;span class=&#34;mord mtight&#34;&gt;1&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.1449000000000003em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;n&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.29634285714285713em;&#34;&gt;&lt;span style=&#34;top:-2.357em;margin-left:0em;margin-right:0.07142857142857144em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.5em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size3 size1 mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.143em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.276864em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34;&gt;d&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.8141079999999999em;&#34;&gt;&lt;span style=&#34;top:-2.441336em;margin-left:0em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;i&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=&#34;top:-3.063em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.258664em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.936em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mclose nulldelimiter&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;
&lt;p&gt;其中：&lt;/p&gt;
&lt;p&gt;d&lt;sub&gt;i,t&lt;/sub&gt;  =  x&lt;sub&gt;i,t&lt;/sub&gt; - y&lt;sub&gt;i,t&lt;/sub&gt;&lt;/p&gt;
&lt;p&gt;注：计算斯皮尔曼等级相关系数时不可进行缩尾处理&lt;/p&gt;
&lt;h3 id=&#34;5相关系数&#34;&gt;5.相关系数&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;相关性分析能够发现多元统计中潜在问题：两个变量如果高度相关且同作为自变量，则难以区分对因变量影响，导致回归系数中的高标准差&lt;/li&gt;
&lt;li&gt;如果斯皮尔曼等级相关系数&lt;strong&gt;显著大于&lt;/strong&gt;皮尔逊积矩，说明两个变量是单调的，而非线性&lt;/li&gt;
&lt;li&gt;反之，则表明一个变量存在一些&lt;strong&gt;极端值&lt;/strong&gt;对皮尔逊积矩产生强烈影响&lt;/li&gt;
&lt;li&gt;皮尔逊积矩有线性假设，对回归技术的结果如&lt;strong&gt;Fama&amp;amp;MacBeth&lt;/strong&gt;回归分析更具指示性&lt;/li&gt;
&lt;li&gt;斯皮尔曼等级相关系数基于变量大小顺序，对依赖于等级或排序分析的结果如&lt;strong&gt;组合分析&lt;/strong&gt;更具指示性&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;6持续性分析&#34;&gt;6.持续性分析&lt;/h2&gt;
&lt;p&gt;很多变量被用来捕获样本元素的持续性特征，这意味着通过给定变量，捕获的元素特征在一定时期内被假定是稳定的，例如β就被认为持续性特征，且通常由历史数据所得。&lt;br&gt;
持续性分析的基本方法是检验两个&lt;strong&gt;不同时点&lt;/strong&gt;测量的给定变量横截面相关系数，如果相关性高则说明这个变量的持续性高。&lt;/p&gt;
&lt;h3 id=&#34;61实施步骤&#34;&gt;6.1实施步骤&lt;/h3&gt;
&lt;p&gt;第一步：计算给定变量X在相差多个时段的横截面相关系数&lt;br&gt;
第二步：计算这些相关系数的时间序列均值&lt;/p&gt;
&lt;h3 id=&#34;62解释持续性&#34;&gt;6.2解释持续性&lt;/h3&gt;
&lt;p&gt;低或零持续性的原因&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;测量的特征实际上并无持续性&lt;/li&gt;
&lt;li&gt;用来衡量给定特征的变量并没有很好测出这个特征，这种情况下即使样本中给定特征具有高度横截面持续性但是X没有捕获这个特征的横截面差异&lt;br&gt;
问题：不能找出持续性不意味持续性不存在，低的ρ可能意味X没有捕获那个特征&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;高的ρ：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;无意捕获了某些持续性特征&lt;br&gt;
高的ρ表明无论X捕获的是什么特性，他都具有持续性&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;7组合分析&#34;&gt;7.组合分析&lt;/h2&gt;
&lt;p&gt;组合分析是实证资产定价中广泛使用的方法，目标是检验横截面上两个以及以上变量之间的关系，如变量对股票未来收益的预测能力，或横截面上不同变量之间的关系。&lt;br&gt;
它的优点是：非参数技术分析，不需要对横截面关系提出假设（例如线性回归要求变量关系是线性的）；&lt;br&gt;
缺点是难以控制大量变量，而回归分析可以控制大量的自变量&lt;/p&gt;
&lt;h3 id=&#34;71单变量组合分析&#34;&gt;7.1单变量组合分析&lt;/h3&gt;
&lt;p&gt;步骤共有四个：&lt;br&gt;
第一步：计算用于分组的断点值&lt;br&gt;
第二步：利用断点值分组&lt;br&gt;
第三步：计算每个时间段t内，每个组合结果变量Y的均值&lt;br&gt;
第四步：检验不同组合中Y的均值变化&lt;/p&gt;
&lt;h4 id=&#34;711断点&#34;&gt;7.1.1断点&lt;/h4&gt;
&lt;ul&gt;
&lt;li&gt;常用做法是在横截面上用均匀间隔的百分位数端点来进行分组，例如5个组合则断点为样本的20，40，60，80百分位数（分3个组合常用30，70百分位数）&lt;/li&gt;
&lt;li&gt;对每个时间段t都要形成新的组合&lt;/li&gt;
&lt;/ul&gt;
&lt;h4 id=&#34;712组合形成&#34;&gt;7.1.2组合形成&lt;/h4&gt;
&lt;ul&gt;
&lt;li&gt;计算出断点后，它可以用于任何样本集&lt;/li&gt;
&lt;/ul&gt;
&lt;h4 id=&#34;713组合平均值&#34;&gt;7.1.3组合平均值&lt;/h4&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;第三步是计算结果变量Y的均值。许多情况下，会使用某种权重计算方法进行加权平均，常用的权重是市值（市值加权平均值）&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;strong&gt;例如，在t年底计算每只股票的β，并形成若干个组合，在整个t+1年持有组合不进行交易实现的超额收益作为结果变量Y，在t+1年底t平仓重新计算β以此类推&lt;/strong&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;若结果变量Y或权重不可获得，则在计算均值时应排除&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;除了计算每个组合的Y均值，我们还计算组合之间的差异，对每个时段，定义最高的一个组合和最低的一个组合之间的结果变量的平均值差异为 : Y&lt;sub&gt;diff,t&lt;/sub&gt; =Y&lt;sub&gt;np,t&lt;/sub&gt; -Y&lt;sub&gt;1,t&lt;/sub&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;上式也称为【差异组合的平均值】，这些平均差异值是用于检测排序变量和结果变量在横截面上关系的主要值，也是组合分析的主要目标&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;注：结果用【超额收益】表示&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h4 id=&#34;714结果总结&#34;&gt;7.1.4结果总结&lt;/h4&gt;
&lt;p&gt;组合分析主要目的是确定X和Y之间是否在横截面上存在相关关系，为此我们计算每个组合的结果变量Y在时间序列上的均值&lt;/p&gt;

&lt;p&gt;时间序列平均值被用作对平均时段中每个组合的结果变量的真实平均值的估计&lt;/p&gt;
&lt;h4 id=&#34;716结果展示&#34;&gt;7.1.6结果展示&lt;/h4&gt;
&lt;ul&gt;
&lt;li&gt;常见展示为T统计量，且常被放在括号中表示&lt;/li&gt;
&lt;li&gt;组合分析的结果可以只展示平均超额收益以及Newey and West调整后的T统计量&lt;/li&gt;
&lt;/ul&gt;
&lt;h4 id=&#34;717收益分析&#34;&gt;7.1.7收益分析&lt;/h4&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;当样本个体是证券，结果变量Y是收益时，平均值Y表示持有每个证券组合的收益，在这种情况下通常要额外分析，旨在检验平均收益是否是因为系统性风险因素的敏感性在横截面上变化驱动&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;即：控制系统性风险因素的敏感性后，组合平均收益出现的模式是否能持续&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;常见的三种风险调整模型：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;

span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mbin&#34;&gt;+&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:0.8888799999999999em;vertical-align:-0.19444em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.05278em;&#34;&gt;β&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.32833099999999993em;&#34;&gt;&lt;span style=&#34;top:-2.5500000000000003em;margin-left:-0.05278em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34; style=&#34;margin-right:0.10903em;&#34;&gt;M&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34; style=&#34;margin-right:0.02778em;&#34;&gt;O&lt;/span&gt;&lt;span class=&#34;mord mathdefault mtight&#34; style=&#34;margin-right:0.10903em;&#34;&gt;M&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.15em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.10903em;&#34;&gt;M&lt;/span&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.02778em;&#34;&gt;O&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34; style=&#34;margin-right:0.10903em;&#34;&gt;M&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.2805559999999999em;&#34;&gt;&lt;span style=&#34;top:-2.5500000000000003em;margin-left:-0.10903em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.15em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mbin&#34;&gt;+&lt;/span&gt;&lt;span class=&#34;mspace&#34; style=&#34;margin-right:0.2222222222222222em;&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;base&#34;&gt;&lt;span class=&#34;strut&#34; style=&#34;height:0.58056em;vertical-align:-0.15em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;mord&#34;&gt;&lt;span class=&#34;mord mathdefault&#34;&gt;ε&lt;/span&gt;&lt;span class=&#34;msupsub&#34;&gt;&lt;span class=&#34;vlist-t vlist-t2&#34;&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.2805559999999999em;&#34;&gt;&lt;span style=&#34;top:-2.5500000000000003em;margin-left:0em;margin-right:0.05em;&#34;&gt;&lt;span class=&#34;pstrut&#34; style=&#34;height:2.7em;&#34;&gt;&lt;/span&gt;&lt;span class=&#34;sizing reset-size6 size3 mtight&#34;&gt;&lt;span class=&#34;mord mathdefault mtight&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-s&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=&#34;vlist-r&#34;&gt;&lt;span class=&#34;vlist&#34; style=&#34;height:0.15em;&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;由于这些用于风险调整的回归都是时间序列回归因此通常需要Newey and West 调整，回归结果是截距，斜率以及相应的标准差，T统计量&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;注：风险模型基于超额收益而不是原始收益进行调整的&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;对np个组合的时间序列平均收益进行分析时，要确保在风险调整的回归中，因变量使用的是【组合超额收益】&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;也因此，组合分析中建议使用股票的超额收益而不是股票的原始收益作为【结果变量Y】&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;72双变量独立排序的组合分析&#34;&gt;7.2双变量独立排序的组合分析&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;考虑相关性：如果两个排序变量高度正相关，可能导致大量个体分入两个排序值都高/低的组合中&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;73双变量序贯排序的组合分析&#34;&gt;7.3双变量序贯排序的组合分析&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;第二个排序变量的断点根据第一个排序变量形成的每个组形成&lt;/li&gt;
&lt;li&gt;在序贯排列中不计算第一个排序变量的平均值差异，因为序贯排列【仅被用作评估第二个排序变量X2和结果变量的关系】，即控制了X1后X2和Y的关系&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;8fama-and-macbeth回归&#34;&gt;8.Fama and MacBeth回归&lt;/h2&gt;
&lt;h3 id=&#34;81实施&#34;&gt;8.1实施&lt;/h3&gt;
&lt;p&gt;第5章的组合分析是一种非参数方法，但难以包含较多的控制变量，Fama MacBeth(1973，简称FM)是检验变量关系的另一种方法，它对变量间关系做出线性假设，但能够控制大量变量&lt;/p&gt;
&lt;p&gt;FM回归需要两步：&lt;/p&gt;
&lt;p&gt;第一步：使用每个时期t的数据，运行被研究的因变量Y对X1，X2等周期性横截面回归，得到【每个自变量每个时期的斜率和截距】&lt;/p&gt;
&lt;p&gt;第二步：分析每个回归系数的时间序列，判断平均系数是否异于0&lt;/p&gt;
&lt;h4 id=&#34;811周期性横截面回归&#34;&gt;8.1.1周期性横截面回归&lt;/h4&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;FM的第一步是以Y为因变量，对自变量进行横截面回归，横截面回归检验方程是：&lt;/p&gt;
&lt;p&gt;Y&lt;sub&gt;i，t&lt;/sub&gt; = δ&lt;sub&gt;0,t&lt;/sub&gt;  +  δ&lt;sub&gt;1,t&lt;/sub&gt;X1&lt;sub&gt;1,t&lt;/sub&gt; + δ&lt;sub&gt;2,t&lt;/sub&gt;X&lt;sub&gt;2,t&lt;/sub&gt; + ... + 截距项&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;回归结果是截距和斜率系数，每个时期也会产生统计结果如R方，调整R方和回归中观测个数；此外，横截面回归不一定使用OLS（二元因变量可用加权最小二乘法logistic回归等）&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h4 id=&#34;812平均横截面回归结果&#34;&gt;8.1.2平均横截面回归结果&lt;/h4&gt;
&lt;ul&gt;
&lt;li&gt;FM第二步是计算横截面回归得到的【截距，斜率系数，R方，样本数等】的【时间序列平均值】，并判断平均系数是否显著异于0（需要Newey West调整）&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;82对fm回归解释&#34;&gt;8.2对FM回归解释&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;统计上显著的平均斜率系数表给定的X和Y存在横截面关系；当不止一个自变量时，显著性表明了控制了包含在回归检验中其他的自变量的效应后，X和Y之间仍然存在关系&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;如果被研究的系数在一个统计检验中先祖但是加入其他变量后不显著，那么X和Y的关系关系可能可以被加入的变量的线性组合解释；如果包含其他变量后，统计显著性出现那么表明为了检验需要研究变量间的关系，控制其他加新加入的变量带来的效应是必要的&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;理解关系大小的经济意义也非常重要：&lt;br&gt;
X的变化的经济重要性易于理解时，系数本身的平均大小具有信息量&lt;br&gt;
X的大小不易理解时，可以采取以下方法：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;X的一个标准差变化对Y期望值产生的效应：时序平均后的X斜率系数 * X横截面标准差&lt;/li&gt;
&lt;li&gt;斜率系数 * X横截面分布的两个百分位数之差&lt;/li&gt;
&lt;li&gt;斜率系数 * 较大X和较小X构成组合的平均差异（类似组合分析）&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;斜率系数，即承担一单位风险X获得的溢价的估计值&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;补充&#34;&gt;补充&lt;/h2&gt;
&lt;h3 id=&#34;检验异象&#34;&gt;检验异象&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;使用异象变量及多因子模型中构造因子的变量同时作为解释变量，以资产（组合或个股，常为个股）超额收益作为被解释变量，每个t进行截面回归，得到异象变量的超额收益（因子收益率），检验时间序列上均值和标准误&lt;/li&gt;
&lt;li&gt;如果控制因子变量后，异象收益仍然显著则可以认为它获得了多因子模型无法解释的超额收益&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;股票收益和超额收益&#34;&gt;股票收益和超额收益&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;使用因子模型评估收益时，使用超额收益是非常重要的：无风险利率不是常数，其变动可能影响结果&lt;/li&gt;
&lt;li&gt;月度收益是预测变量被计算后，下一个月的收益：t表示预测变量计算的月份，则t+1月份为被预测的收益&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;市场因子&#34;&gt;市场因子&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;市场因子的定义为市场组合的超额收益&lt;/li&gt;
&lt;li&gt;理论上说市场组合包括所有投资之和，因为难以观测计算，常用替代的算法，如金融证券的组合&lt;/li&gt;
&lt;li&gt;实证资产定价中将（美国）普通股票市场加权组合的【超额收益】（市场收益减去无风险收益）记为MKT&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;capm风险模型&#34;&gt;CAPM风险模型&lt;/h3&gt;
&lt;ul&gt;
&lt;li&gt;CAPM是考虑了组合或证券对市场组合的风险暴露后，被用来计算一个组合或者证券的平均异常收益的模型&lt;/li&gt;
&lt;li&gt;异常收益也称为α，如果α统计上异于0表明组合产生非0超额收益并非由对市场组合的敏感所致&lt;/li&gt;
&lt;/ul&gt;
">实证资产定价(一)预备知识</a>

          &lt;p&gt;👏  欢迎使用 &lt;strong&gt;Gridea&lt;/strong&gt; ！&lt;br&gt;
✍️  &lt;strong&gt;Gridea&lt;/strong&gt; 一个静态博客写作客户端。你可以用它来记录你的生活、心情、知识、笔记、创意... ...&lt;/p&gt;

&lt;a href=&#34;https://gridea.dev/&#34;&gt;Gridea 主页&lt;/a&gt;&lt;br&gt;
&lt;a href=&#34;http://fehey.com/&#34;&gt;示例网站&lt;/a&gt;&lt;/p&gt;
&lt;h2 id=&#34;特性&#34;&gt;特性👇&lt;/h2&gt;
&lt;p&gt;📝  你可以使用最酷的 &lt;strong&gt;Markdown&lt;/strong&gt; 语法，进行快速创作&lt;/p&gt;
&lt;p&gt;🌉  你可以给文章配上精美的封面图和在文章任意位置插入图片&lt;/p&gt;
&lt;p&gt;🏷️  你可以对文章进行标签分组&lt;/p&gt;
&lt;p&gt;📋  你可以自定义菜单，甚至可以创建外部链接菜单&lt;/p&gt;
&lt;p&gt;💻  你可以在 &lt;strong&gt;Windows&lt;/strong&gt;，&lt;strong&gt;MacOS&lt;/strong&gt; 或 &lt;strong&gt;Linux&lt;/strong&gt; 设备上使用此客户端&lt;/p&gt;
&lt;p&gt;🌎  你可以使用 &lt;strong&gt;𝖦𝗂𝗍𝗁𝗎𝖻 𝖯𝖺𝗀𝖾𝗌&lt;/strong&gt; 或 &lt;strong&gt;Coding Pages&lt;/strong&gt; 向世界展示，未来将支持更多平台&lt;/p&gt;
&lt;p&gt;💬  你可以进行简单的配置，接入 &lt;a href=&#34;https://github.com/gitalk/gitalk&#34;&gt;Gitalk&lt;/a&gt; 或 &lt;a href=&#34;https://github.com/SukkaW/DisqusJS&#34;&gt;DisqusJS&lt;/a&gt; 评论系统&lt;/p&gt;
&lt;p&gt;🇬🇧  你可以使用&lt;strong&gt;中文简体&lt;/strong&gt;或&lt;strong&gt;英语&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;🌁  你可以任意使用应用内默认主题或任意第三方主题，强大的主题自定义能力&lt;/p&gt;
&lt;p&gt;🖥  你可以自定义源文件夹，利用 OneDrive、百度网盘、iCloud、Dropbox 等进行多设备同步&lt;/p&gt;
&lt;p&gt;🌱 当然 &lt;strong&gt;Gridea&lt;/strong&gt; 还很年轻，有很多不足，但请相信，它会不停向前 🏃&lt;/p&gt;
&lt;p&gt;未来，它一定会成为你离不开的伙伴&lt;/p&gt;
&lt;p&gt;尽情发挥你的才华吧！&lt;/p&gt;
