\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.8888799999999999em;vertical-align:-0.19444em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.05278em;\&#34;&gt;β&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.32833099999999993em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:-0.05278em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.02778em;\&#34;&gt;O&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.02778em;\&#34;&gt;O&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.2805559999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:-0.10903em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mbin\&#34;&gt;+&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.58056em;vertical-align:-0.15em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;ε&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.2805559999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:0em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;由于这些用于风险调整的回归都是时间序列回归因此通常需要Newey and West 调整，回归结果是截距，斜率以及相应的标准差，T统计量&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;注：风险模型基于超额收益而不是原始收益进行调整的&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;对np个组合的时间序列平均收益进行分析时，要确保在风险调整的回归中，因变量使用的是【组合超额收益】&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;也因此，组合分析中建议使用股票的超额收益而不是股票的原始收益作为【结果变量Y】&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;72双变量独立排序的组合分析\&#34;&gt;7.2双变量独立排序的组合分析&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;考虑相关性：如果两个排序变量高度正相关，可能导致大量个体分入两个排序值都高/低的组合中&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;73双变量序贯排序的组合分析\&#34;&gt;7.3双变量序贯排序的组合分析&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;第二个排序变量的断点根据第一个排序变量形成的每个组形成&lt;/li&gt;\n&lt;li&gt;在序贯排列中不计算第一个排序变量的平均值差异，因为序贯排列【仅被用作评估第二个排序变量X2和结果变量的关系】，即控制了X1后X2和Y的关系&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;8fama-and-macbeth回归\&#34;&gt;8.Fama and MacBeth回归&lt;/h2&gt;\n&lt;h3 id=\&#34;81实施\&#34;&gt;8.1实施&lt;/h3&gt;\n&lt;p&gt;第5章的组合分析是一种非参数方法，但难以包含较多的控制变量，Fama MacBeth(1973，简称FM)是检验变量关系的另一种方法，它对变量间关系做出线性假设，但能够控制大量变量&lt;/p&gt;\n&lt;p&gt;FM回归需要两步：&lt;/p&gt;\n&lt;p&gt;第一步：使用每个时期t的数据，运行被研究的因变量Y对X1，X2等周期性横截面回归，得到【每个自变量每个时期的斜率和截距】&lt;/p&gt;\n&lt;p&gt;第二步：分析每个回归系数的时间序列，判断平均系数是否异于0&lt;/p&gt;\n&lt;h4 id=\&#34;811周期性横截面回归\&#34;&gt;8.1.1周期性横截面回归&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;FM的第一步是以Y为因变量，对自变量进行横截面回归，横截面回归检验方程是：&lt;/p&gt;\n&lt;p&gt;Y&lt;sub&gt;i，t&lt;/sub&gt; = δ&lt;sub&gt;0,t&lt;/sub&gt;  +  δ&lt;sub&gt;1,t&lt;/sub&gt;X1&lt;sub&gt;1,t&lt;/sub&gt; + δ&lt;sub&gt;2,t&lt;/sub&gt;X&lt;sub&gt;2,t&lt;/sub&gt; + ... + 截距项&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;回归结果是截距和斜率系数，每个时期也会产生统计结果如R方，调整R方和回归中观测个数；此外，横截面回归不一定使用OLS（二元因变量可用加权最小二乘法logistic回归等）&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&#34;812平均横截面回归结果\&#34;&gt;8.1.2平均横截面回归结果&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;FM第二步是计算横截面回归得到的【截距，斜率系数，R方，样本数等】的【时间序列平均值】，并判断平均系数是否显著异于0（需要Newey West调整）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;82对fm回归解释\&#34;&gt;8.2对FM回归解释&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;统计上显著的平均斜率系数表给定的X和Y存在横截面关系；当不止一个自变量时，显著性表明了控制了包含在回归检验中其他的自变量的效应后，X和Y之间仍然存在关系&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;如果被研究的系数在一个统计检验中先祖但是加入其他变量后不显著，那么X和Y的关系关系可能可以被加入的变量的线性组合解释；如果包含其他变量后，统计显著性出现那么表明为了检验需要研究变量间的关系，控制其他加新加入的变量带来的效应是必要的&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;理解关系大小的经济意义也非常重要：&lt;br&gt;\nX的变化的经济重要性易于理解时，系数本身的平均大小具有信息量&lt;br&gt;\nX的大小不易理解时，可以采取以下方法：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;X的一个标准差变化对Y期望值产生的效应：时序平均后的X斜率系数 * X横截面标准差&lt;/li&gt;\n&lt;li&gt;斜率系数 * X横截面分布的两个百分位数之差&lt;/li&gt;\n&lt;li&gt;斜率系数 * 较大X和较小X构成组合的平均差异（类似组合分析）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;斜率系数，即承担一单位风险X获得的溢价的估计值&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;补充\&#34;&gt;补充&lt;/h2&gt;\n&lt;h3 id=\&#34;检验异象\&#34;&gt;检验异象&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;使用异象变量及多因子模型中构造因子的变量同时作为解释变量，以资产（组合或个股，常为个股）超额收益作为被解释变量，每个t进行截面回归，得到异象变量的超额收益（因子收益率），检验时间序列上均值和标准误&lt;/li&gt;\n&lt;li&gt;如果控制因子变量后，异象收益仍然显著则可以认为它获得了多因子模型无法解释的超额收益&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;股票收益和超额收益\&#34;&gt;股票收益和超额收益&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;使用因子模型评估收益时，使用超额收益是非常重要的：无风险利率不是常数，其变动可能影响结果&lt;/li&gt;\n&lt;li&gt;月度收益是预测变量被计算后，下一个月的收益：t表示预测变量计算的月份，则t+1月份为被预测的收益&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;市场因子\&#34;&gt;市场因子&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;市场因子的定义为市场组合的超额收益&lt;/li&gt;\n&lt;li&gt;理论上说市场组合包括所有投资之和，因为难以观测计算，常用替代的算法，如金融证券的组合&lt;/li&gt;\n&lt;li&gt;实证资产定价中将（美国）普通股票市场加权组合的【超额收益】（市场收益减去无风险收益）记为MKT&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;capm风险模型\&#34;&gt;CAPM风险模型&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;CAPM是考虑了组合或证券对市场组合的风险暴露后，被用来计算一个组合或者证券的平均异常收益的模型&lt;/li&gt;\n&lt;li&gt;异常收益也称为α，如果α统计上异于0表明组合产生非0超额收益并非由对市场组合的敏感所致&lt;/li&gt;\n&lt;/ul&gt;\n&#34;,&#34;fileName&#34;:&#34;shi-zheng-zi-chan-ding-jie-1-yu-bei-zhi-shi&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;实证资产定价(一)预备知识&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-02-11 23:21:05&#34;,&#34;dateFormat&#34;:&#34;2021-02-11&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https:// &gt;&lt;a href=\&#34;#713%E7%BB%84%E5%90%88%E5%B9%B3%E5%9D%87%E5%80%BC\&#34;&gt;7.1.3组合平均值&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#714%E7%BB%93%E6%9E%9C%E6%80%BB%E7%BB%93\&#34;&gt;7.1.4结果总结&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#716%E7%BB%93%E6%9E%9C%E5%B1%95%E7%A4%BA\&#34;&gt;7.1.6结果展示&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#717%E6%94%B6%E7%9B%8A%E5%88%86%E6%9E%90\&#34;&gt;7.1.7收益分析&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#72%E5%8F%8C%E5%8F%98%E9%87%8F%E7%8B%AC%E7%AB%8B%E6%8E%92%E5%BA%8F%E7%9A%84%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;7.2双变量独立排序的组合分析&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#73%E5%8F%8C%E5%8F%98%E9%87%8F%E5%BA%8F%E8%B4%AF%E6%8E%92%E5%BA%8F%E7%9A%84%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;7.3双变量序贯排序的组合分析&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#8fama-and-macbeth%E5%9B%9E%E5%BD%92\&#34;&gt;8.Fama and MacBeth回归&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#81%E5%AE%9E%E6%96%BD\&#34;&gt;8.1实施&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#811%E5%91%A8%E6%9C%9F%E6%80%A7%E6%A8%AA%E6%88%AA%E9%9D%A2%E5%9B%9E%E5%BD%92\&#34;&gt;8.1.1周期性横截面回归&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#812%E5%B9%B3%E5%9D%87%E6%A8%AA%E6%88%AA%E9%9D%A2%E5%9B%9E%E5%BD%92%E7%BB%93%E6%9E%9C\&#34;&gt;8.1.2平均横截面回归结果&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#82%E5%AF%B9fm%E5%9B%9E%E5%BD%92%E8%A7%A3%E9%87%8A\&#34;&gt;8.2对FM回归解释&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%A1%A5%E5%85%85\&#34;&gt;补充&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%A3%80%E9%AA%8C%E5%BC%82%E8%B1%A1\&#34;&gt;检验异象&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%82%A1%E7%A5%A8%E6%94%B6%E7%9B%8A%E5%92%8C%E8%B6%85%E9%A2%9D%E6%94%B6%E7%9B%8A\&#34;&gt;股票收益和超额收益&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%B8%82%E5%9C%BA%E5%9B%A0%E5%AD%90\&#34;&gt;市场因子&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a h
