<script>
  // var escape = "[{&#34;content&#34;:&#34;&lt;p&gt;本章重点是对价值溢价的实证研究并证明账面市值比和股票期望收益之间的正相关关系&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;价值股和未来收益的相关收益的相关性可以归因为两个变量——市值和权益的账面市值比（Fama and French 1992）；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;股票期望收益和账面市值比之间的正相关关系研究充满争议，目前两种主要解释为：&lt;br&gt;\n1、Fama和French（1993）以及Chen和Zhang（1998）提出的基于风险的解释，价值股更高的收益是由于其对定价风险因素的暴露程度更高；他们的研究表明价值企业通常有较低的收益，较高的收益不确定性和较高的杠杆水平。&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;该理论的支持者认为，经济条件很差，风险溢价很高时，做多价值股并做空成长股的组合的风险很高。Lettau和Ludvigson（2001）的实证研究支持了这一论点：经济下滑时期，相对于成长股的组合收益，价值股的组合收益与消费增长相关性更高。Zhang（2005）从基于生产的资产定价模型中得出此理论，在该模型中，价值股比成长股的风险更高，尤其在经济环境糟糕和风险溢价突增的国家表现更为明显。Fama 和French（1995）发现在此期间，高账面市值比是公司持续盈利能力低的表现。&lt;/p&gt;\n&lt;p&gt;2、第二种基于投资者行为的解释；与价值投资相关的收益是由于幼稚的投资者对未来增长的预期导致的错误定价所带来的。价值股的高收益是由投资者错误估计企业未来收益增长导致的错误定价造成的，幼稚的投资者往往过分依据以往的增长情况来估计未来增长，幼稚的投资者对过去表现非常好的股票过于乐观，创造了对这种股票的需求，导致这些魅力股票的定价过高。类似地，幼稚的投资者往往对过去表现较差的股票过度反应，过度地抛售，导致这些价值股的定价过低。&lt;/p&gt;\n&lt;p&gt;到底反转策略能产生高收益是因为股票被错误定价，还是因为价值股的基本风险高于成长股，目前还没有定论&lt;/p&gt;\n&lt;h3 id=\&#34;计算账面市值比\&#34;&gt;计算账面市值比&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;账面市值比记为BM，定义为公司普通股账面价值BE除以公司权益市场的价值ME&lt;/p&gt;\n&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=\&#34;katex-display\&#34;&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;B&lt;/mi&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mfrac&gt;&lt;mrow&gt;&lt;mi&gt;B&lt;/mi&gt;&lt;mi&gt;E&lt;/mi&gt;&lt;/mrow&gt;&lt;mrow&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mi&gt;E&lt;/mi&gt;&lt;/mrow&gt;&lt;/mfrac&gt;&lt;/mrow&gt;&lt;annotation encoding=\&#34;application/x-tex\&#34;&gt;BM=\\frac{BE}{ME}\n&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=\&#34;katex-html\&#34; aria-hidden=\&#34;true\&#34;&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.68333em;vertical-align:0em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.05017em;\&#34;&gt;B&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mrel\&#34;&gt;=&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:2.04633em;vertical-align:-0.686em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mopen nulldelimiter\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mfrac\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:1.36033em;\&#34;&gt;&lt;span style=\&#34;top:-2.314em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.05764em;\&#34;&gt;E&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.23em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;frac-line\&#34; style=\&#34;border-bottom-width:0.04em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.677em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.05017em;\&#34;&gt;B&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.05764em;\&#34;&gt;E&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.686em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mclose nulldelimiter\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;其中账面价值取自公司资产负债表，市场价值和公司市值相同，由于BM高度右偏（参考市值）为了最小化数据分析中BM极端影响，使用BM的自然对数lnBM&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;BE的计算开始于股东权益的账面价值，书中加上了递延税和投资税收抵免修正了税收效应对价值的影响，最后再从中减去优先股的账面价值&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;BE的计算结果可能为负，数据处理时会舍去这些数据&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;计算市场权益通常使用的是市场价值，即任意指定年份12月的流通股数量乘以价格&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;最后，匹配BE和ME的时间。最标准的方法是Fama和French的做法：第y个财年年底的数据计算的账面净值和同一年y年底计算的市场价值进行匹配（对于每年1月作为会计年底的公司，账面净值将于给定年度1月底进行计算，市场价值将于同年12月底计算，即时间差最多11个月）&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;因为计算年份y账面市值比所用的数据在y+1年6月才公布，为了确保数据可以公开获取，年份y+1的6月到年份y+2的5月的BM使用年份y数据计算而得&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;即，对于本书月度分析而言，年度y+1的6月到年度y+2的5月期间月份t的账面市值比，可以看作每个自然年度y年底的权益账面价值除以年度y年底即12月的市场价值。&lt;/strong&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;描述性统计\&#34;&gt;描述性统计&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;BM具有非常明显正偏态分布，也有肥尾特性&lt;/li&gt;\n&lt;li&gt;有效且能获得的BM比β和MktCap少，缺失值较多&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;相关性\&#34;&gt;相关性&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;BM和lnBM的皮尔逊积矩相关系数非常高（斯皮尔曼为1）BM和市场贝塔，股票规模是负相关的&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;持续性\&#34;&gt;持续性&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;BM和lnBM有比较显著的持续性，即使滞后期到了5年持续性也很高。在所有滞后期中lnBM的持续性都比BM略高&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;账面市值比和股票收益\&#34;&gt;账面市值比和股票收益&lt;/h3&gt;\n&lt;p&gt;####1、 单变量组合分析&lt;br&gt;\n根据BM排序而形成十分位数组合进行单变量组合分析，结果如表10.1所示&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613733222662.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n从表中A部分可以看出，在市值加权组合下并没有检测出显著的价值溢价，高减低组合经Newey West调整的T统计量仅为-0.24；而在等权重组合中，从第1十分位到第10十分位的收益则呈现出了一定的单调性（增），高减低组合经Newey West调整的T统计量为1.76，具有一定统计意义。&lt;/p&gt;\n&lt;h4 id=\&#34;2-双变量组合分析\&#34;&gt;2、双变量组合分析&lt;/h4&gt;\n&lt;p&gt;现在我们将MktCap作为控制变量，通过双变量独立排序进一步检测价值溢价。根据市值和BM将股票各分为5组，一共形成25个组合，采用市值加权和等权重方法分别计算组合超额收益，结果如表10.2所示：&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613733637878.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;从表中可以发现，无论采用等权重还是市值加权，市值最大组（MktCap5）的BM差异组合无论是超额收益的数值还是显著性，相比于其他组合都是最低的，Bali在美股的检验中也发现了相同现象，书中得出了价值效应在大市值股票中不存在的结论，虽然在A股各组显著性均不够高，但各组数据的趋势大致相同。&lt;br&gt;\n另外，市值加权和等权重组合产生了相似的结果，Bali在书中提到了解释：因为市值本身是排序变量，每个组合中股票的市值是相似的，所以采用市值加权不会带来很大影响。&lt;br&gt;\n最后，在控制了市值后，各个市值组合的BM差异组合都无法证明A股存在价值溢价&lt;/p&gt;\n&lt;h4 id=\&#34;1053-fama和macbeth回归分析\&#34;&gt;10.5.3 Fama和MacBeth回归分析&lt;/h4&gt;\n&lt;p&gt;现在用FM回归继续检验BM和股票未来收益的关系，考虑到BM和Size分布的高偏度，将BM和市值取对数作为回归自变量，结果如表10.3所示：&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613734653141.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n列（1）使用lnBM作为唯一自变量；回归得到lnBM的平均斜率系数为0.24，Newey West调整T统计量为2.02，这次检验出了BM和股票未来收益之间具有一定统计意义的正相关关系。&lt;br&gt;\n列（2）使用lnBM和Size作为自变量；这时lnBM平均斜率下降到0.19且T统计量下降到1.51，而Size检测出了显著的与收益的负相关关系。&lt;br&gt;\n列（3）使用lnBM和β作为自变量；和Size类似，lnBM负相关关系显著性下降，而β却未来收益有着显著负相关关系。&lt;br&gt;\n列（4）使用lnBM，β和Size作为自变量，出乎意料地，三个自变量均检测了显著的正相关和负相关性&lt;/p&gt;\n&lt;h3 id=\&#34;106价值因子fama和french三因子模型\&#34;&gt;10.6价值因子，Fama和French三因子模型&lt;/h3&gt;\n&lt;p&gt;Fama 和 French构建了一个0成本组合，持有高账面市值比的股票多头头寸和低账面市值比的空头头寸，并把这个组合成为HML&lt;/p&gt;\n&lt;p&gt;FF风险模型常被用于评估组合是否产生不是由于对风险因素敏感所得的平均收益，三因子模型包含三个风险因子：MKT，SMB，HML。这些组合中的每一个收益旨在代替与获取一个给定风险相关的收益，同时与其他风险有最少的接触&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;如果α统计上异于0，表明组合产生超额收益且不是对市场，规模和价值因素的敏感性产生&lt;/li&gt;\n&lt;/ul&gt;\n&#34;,&#34;fileName&#34;:&#34;shi-zheng-zi-chan-ding-jie-si-jie-zhi-yi-jie&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;实证资产定价（四）价值溢价&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-02-19 18:32:44&#34;,&#34;dateFormat&#34;:&#34;2021-02-19&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://dorianhung.github.io/post/shi-zheng-zi-chan-ding-jie-si-jie-zhi-yi-jie/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;8 min read&#34;,&#34;time&#34;:445000,&#34;words&#34;:2118,&#34;minutes&#34;:8},&#34;description&#34;:&#34;本章重点是对价值溢价的实证研究并证明账面市值比和股票期望收益之间的正相关关系\n\n\n价值股和未来收益的相关收益的相关性可以归因为两个变量——市值和权益的账面市值比（Fama and French 1992）；\n\n\n股票期望收益和账面市值比之间...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%AE%A1%E7%AE%97%E8%B4%A6%E9%9D%A2%E5%B8%82%E5%80%BC%E6%AF%94\&#34;&gt;计算账面市值比&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%8F%8F%E8%BF%B0%E6%80%A7%E7%BB%9F%E8%AE%A1\&#34;&gt;描述性统计&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%9B%B8%E5%85%B3%E6%80%A7\&#34;&gt;相关性&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%8C%81%E7%BB%AD%E6%80%A7\&#34;&gt;持续性&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%B4%A6%E9%9D%A2%E5%B8%82%E5%80%BC%E6%AF%94%E5%92%8C%E8%82%A1%E7%A5%A8%E6%94%B6%E7%9B%8A\&#34;&gt;账面市值比和股票收益&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#2-%E5%8F%8C%E5%8F%98%E9%87%8F%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;2、双变量组合分析&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#1053-fama%E5%92%8Cmacbeth%E5%9B%9E%E5%BD%92%E5%88%86%E6%9E%90\&#34;&gt;10.5.3 Fama和MacBeth回归分析&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#106%E4%BB%B7%E5%80%BC%E5%9B%A0%E5%AD%90fama%E5%92%8Cfrench%E4%B8%89%E5%9B%A0%E5%AD%90%E6%A8%A1%E5%9E%8B\&#34;&gt;10.6价值因子，Fama和French三因子模型&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;规模效应是指大市值股票的收益常常比小市值收益低。&lt;/p&gt;\n&lt;p&gt;Fama和French（1992）关于规模效应的主要结论是：市值有预测未来股票横截面收益的能力，特别的，小市值股票获得显著高于大市值股票的平均历史收益；Fama和French（1993）设计并构造了一个组合，该组合的收益拟合了与规模效应相关的收益，他们进一步提出将这个组合的收益作为一个风险因子，记为SMB（小减大）&lt;/p&gt;\n&lt;h2 id=\&#34;计算市值\&#34;&gt;计算市值&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;市值定义为所有流通股的总价值（发行的股份总数乘以单股价格）&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;计算市值最简单的办法是测算期期末（如月末）的股票价格和流通股数量；另一种是Fama和French计算方法：y年6月最后一个交易日数据计算市值并保持到y+1年的6月最后一个交易日（美股年报），优点在于市值不受到股价短期波动影响。但以上两种方法对结果产生的影响都微乎其微。&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;市值的横截面分布是【高度偏态分布】，一小部分股票的市值非常大，为了避免极端值常用市值的自然对数（记为Size）作为变量&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;分析时间跨度大时，通胀导致市值的解释随时间而改变，为了使不同时期的实证分析结果可比较，通常需要对市值的度量进行通胀调整&lt;/p&gt;\n&lt;p&gt;如：以2012年为标准进行调整&lt;/p&gt;\n&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=\&#34;katex-display\&#34;&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mi&gt;k&lt;/mi&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;a&lt;/mi&gt;&lt;msubsup&gt;&lt;mi&gt;p&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;mrow&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;P&lt;/mi&gt;&lt;mi&gt;I&lt;/mi&gt;&lt;/mrow&gt;&lt;/msubsup&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mi&gt;k&lt;/mi&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;a&lt;/mi&gt;&lt;msub&gt;&lt;mi&gt;p&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo&gt;∗&lt;/mo&gt;&lt;mfrac&gt;&lt;mrow&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;P&lt;/mi&gt;&lt;msub&gt;&lt;mi&gt;I&lt;/mi&gt;&lt;mrow&gt;&lt;mn&gt;12&lt;/mn&gt;&lt;mi mathvariant=\&#34;normal\&#34;&gt;/&lt;/mi&gt;&lt;mn&gt;2012&lt;/mn&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;/mrow&gt;&lt;mrow&gt;&lt;mi&gt;C&lt;/mi&gt;&lt;mi&gt;P&lt;/mi&gt;&lt;msub&gt;&lt;mi&gt;I&lt;/mi&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/msub&gt;&lt;/mrow&gt;&lt;/mfrac&gt;&lt;/mrow&gt;&lt;annotation encoding=\&#34;application/x-tex\&#34;&gt;MktCap_{i,t}^{CPI}=MktCap_{i,t}*\\frac{CPI_{12/2012}}{CPI_t}\n&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=\&#34;katex-html\&#34; aria-hidden=\&#34;true\&#34;&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:1.274439em;vertical-align:-0.383108em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.03148em;\&#34;&gt;k&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;t&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.07153em;\&#34;&gt;C&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;a&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;p&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.891331em;\&#34;&gt;&lt;span style=\&#34;top:-2.4530000000000003em;margin-left:0em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;i&lt;/span&gt;&lt;span class=\&#34;mpunct mtight\&#34;&gt;,&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.1130000000000004em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.07153em;\&#34;&gt;C&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.13889em;\&#34;&gt;P&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.07847em;\&#34;&gt;I&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.383108em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mrel\&#34;&gt;=&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.980548em;vertical-align:-0.286108em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.03148em;\&#34;&gt;k&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;t&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.07153em;\&#34;&gt;C&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;a&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;p&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.311664em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:0em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;i&lt;/span&gt;&lt;span class=\&#34;mpunct mtight\&#34;&gt;,&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.286108em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mbin\&#34;&gt;∗&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:2.2645299999999997em;vertical-align:-0.8360000000000001em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mopen nulldelimiter\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mfrac\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:1.4285299999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.3139999999999996em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.07153em;\&#34;&gt;C&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.13889em;\&#34;&gt;P&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.07847em;\&#34;&gt;I&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.2805559999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:-0.07847em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.23em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;frac-line\&#34; style=\&#34;border-bottom-width:0.04em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.7451999999999996em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.07153em;\&#34;&gt;C&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.13889em;\&#34;&gt;P&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.07847em;\&#34;&gt;I&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.34480000000000005em;\&#34;&gt;&lt;span style=\&#34;top:-2.5198em;margin-left:-0.07847em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;1&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;2&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;/&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;2&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;0&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;1&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.3551999999999999em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.8360000000000001em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mclose nulldelimiter\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;规模和股票收益\&#34;&gt;规模和股票收益&lt;/h2&gt;\n&lt;h3 id=\&#34;1-单变量组合分析\&#34;&gt;1、单变量组合分析&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;在计算断点时，书中采用纽交所(NYSE)上市的股票进行计算，而非CRSP，这是因为NYSE市值要比AMEX或NASDAQ上市的股票市值高得多（如果采用CRSP计算则会有效分离NASDAQ,NYSE,AMEX的股票）;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;表9.1中为A股最近十年单变量组合分析的结果，其中断点由全部A股（剔除上市不满一年股票）计算，每个月形成了10个分位组合，流通市值作为排序变量。特别地，第10十分位市值的均值超过了各组均值之和的一半。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613556845720.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;结果显示，做多高市值股票做空低市值股票的差异组合无论是采用市值加权，还是等权重都产生了在经济上较大的平均收益率，且具有一定的统计学意义。&lt;br&gt;\n值得注意的是，在采用市值加权计算收益时，市值不仅作为排序变量，也作为权重，差异组合的显著性和收益均低于等权重组合。&lt;br&gt;\n通过观察1~10分位组合，A股市场和美股市场展现出了类似的结果：各组超额收益呈现了一定的单调性，具有最低市值具有最高的超额收益且显著性更强，&lt;strong&gt;市值和股票未来收益之间的横截面关系似乎是由样本中市值最低的股票的高超额收益驱动的。&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;如果规模效应是由极小市值的一部分股票驱动，这些股票可能存在流动性不足的问题从而使得旨在捕捉基于规模的策略实施相当困难。&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;2-双变量组合分析\&#34;&gt;2、双变量组合分析&lt;/h3&gt;\n&lt;p&gt;现在我用双变量组合继续检验规模和收益之间的关系，引入变量贝塔，观察控制市场贝塔后市值和股票收益的关系，根据贝塔和市值把股票各独立分成5组，一共形成25个组合。&lt;br&gt;\n理论上，高贝塔股票应该具有高的期望收益，考虑到市值低的股票常常具有低贝塔值，所以没有理论可以期望β能解释极低市值的股票会有高收益这一现象。然而在上一章中，我们发现了β和未来收益的负向关系，这一结论表明控制β也许能解释规模效应。&lt;/p&gt;\n&lt;p&gt;&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613556851112.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n表9.2呈现双变量独立组合分析的结果，无论是等权重还是市值加权，规模效应只存在于β最低的五分位数组中。&lt;/p&gt;\n&lt;p&gt;双变量得出了和单变量组合分析相似的结论，等权重产生的结果比市值加权产生的效果更强，在双变量组合分析中控制贝塔后，仅有低贝塔组合检测出了统计上显著的规模效应，市值和股票期望收益之间的负相关关系强度很大程度上取决于分析方法。&lt;/p&gt;\n&lt;p&gt;###3、Fama和MacBeth回归分析&lt;br&gt;\n现在我们用FM回归来检验规模效应，每个月用规模或规模与贝塔对未来1个月的股票平均超额收益进行横截面回归。在进行回归时为了避免极端的市值造成影响采用Size（流通市值取对数）作为解释变量。&lt;br&gt;\n表9.3呈现了FM回归分析的结果&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613556912359.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;列（1）显示，Size为唯一自变量时，截面回归月平均斜率为-0.52，Newey West调整T统计量为-2.34，表明Size和股票未来收益之间存在统计上显著的负相关关系。&lt;br&gt;\n列（2）显示，控制β影响后，Size的平均斜率为-0.49，Newey West调整T统计量为-2.31，规模和股票未来收益之间负横截面关系仍然存在，β调整T统计量为-1.78，在统计上勉强显著。&lt;/p&gt;\n&lt;p&gt;接下来检测列1在经济上的显著性，通过describe()函数得到回归自变量的描述性统计，如下表所示。&lt;br&gt;\n&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613566085343.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613566822520.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;br&gt;\n注：超额收益没有采用百分形式&lt;/p&gt;\n&lt;p&gt;将包含控制变量β的回归方程式中Size的平均斜率系数-0.49乘以标准差2得到-0.98，这表明其他条件相同时，Size的一个标准差偏差与每月0.98%的股票期望收益差额相关，这在经济上也是十分重要的。&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;总结：&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;采用市值加权计算收益产生的规模效应比等权重弱一些；&lt;/li&gt;\n&lt;li&gt;规模效应由市值最低十分位数组合中的股票的极大收益驱动，规模效应集中在低市场贝塔的股票中；&lt;/li&gt;\n&lt;li&gt;组合收益和FM回归分析都检测出了规模和未来收益的显著的负相关关系，控制了β之后二者关系依然存在，它和CAPM的预测矛盾（市值可能作为暴露于不包括在基准资产定价模型CAPM的风险的代理）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;规模因子\&#34;&gt;规模因子&lt;/h2&gt;\n&lt;p&gt;考虑到市值是股票暴露在一个可定价但以前未定义的风险因素，Fama和French创建了一个0成本多空组合SMB，&lt;strong&gt;旨在产生一个收益近似于与该位置规模因子一个单位风险相关联的收益，且对其他因子敏感性很小&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;在y年6月，根据所有股票市值【中值】分成S组和B组；&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;在y年6月，根据账面市值比（BM）【独立】分为三组，BM等于y-1年的财年年底普通股账面价值除以y-1年12月底的股票市值，H组包含BM高于70百分位数的股票，M组包含30，70百分位数之间的股票，L组包含低于30百分位的股票&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;这两个市值组和三个账面市值比交集形成6个组合，六个组合中每个组合中股票市值加权（y年6月底计算），计算6个组合y年7月到y+1年6月的月收益率，其中每个月都会重新构造组合&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;模拟规模因子的组合（SMB）在任一月m的收益等于：三个低市值组合（S/H，S/M，S/L）的收益【简单平均值】减去三个高市值股票（B/H，B/M，B/L）组合收益的【简单平均值】，该组合设计的目的是创建一个多空组合，其收益率对高市值股票和低市值股票之间的收益差异非常敏感，并且对高和低账面市值比股票之间的收益率差异相对不敏感&lt;/strong&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;,&#34;fileName&#34;:&#34;shi-zheng-zi-chan-ding-jie-san-gui-mo-xiao-ying&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;实证资产定价（三）规模效应&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-02-17 11:45:26&#34;,&#34;dateFormat&#34;:&#34;2021-02-17&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://dorianhung.github.io/post/shi-zheng-zi-chan-ding-jie-san-gui-mo-xiao-ying/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;8 min read&#34;,&#34;time&#34;:446000,&#34;words&#34;:2119,&#34;minutes&#34;:8},&#34;description&#34;:&#34;规模效应是指大市值股票的收益常常比小市值收益低。\nFama和French（1992）关于规模效应的主要结论是：市值有预测未来股票横截面收益的能力，特别的，小市值股票获得显著高于大市值股票的平均历史收益；Fama和French（1993）设计...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%AE%A1%E7%AE%97%E5%B8%82%E5%80%BC\&#34;&gt;计算市值&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%A7%84%E6%A8%A1%E5%92%8C%E8%82%A1%E7%A5%A8%E6%94%B6%E7%9B%8A\&#34;&gt;规模和股票收益&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#1-%E5%8D%95%E5%8F%98%E9%87%8F%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;1、单变量组合分析&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#2-%E5%8F%8C%E5%8F%98%E9%87%8F%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;2、双变量组合分析&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%A7%84%E6%A8%A1%E5%9B%A0%E5%AD%90\&#34;&gt;规模因子&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;h1 id=\&#34;第八章-贝塔\&#34;&gt;第八章 贝塔&lt;/h1&gt;\n&lt;p&gt;根据CAPM，任一证券的期望收益率等于无风险证券收益加上证券市场β乘以市场风险溢价。用数学表示CAPM为：&lt;/p&gt;\n&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=\&#34;katex-display\&#34;&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;E&lt;/mi&gt;&lt;mrow&gt;&lt;mo fence=\&#34;true\&#34;&gt;[&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;R&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo fence=\&#34;true\&#34;&gt;]&lt;/mo&gt;&lt;/mrow&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;R&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo&gt;+&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;β&lt;/mi&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;/msub&gt;&lt;mrow&gt;&lt;mo fence=\&#34;true\&#34;&gt;(&lt;/mo&gt;&lt;mi&gt;E&lt;/mi&gt;&lt;mrow&gt;&lt;mo fence=\&#34;true\&#34;&gt;[&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;R&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;m&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo fence=\&#34;true\&#34;&gt;]&lt;/mo&gt;&lt;/mrow&gt;&lt;mo&gt;−&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;R&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo fence=\&#34;true\&#34;&gt;)&lt;/mo&gt;&lt;/mrow&gt;&lt;/mrow&gt;&lt;annotation encoding=\&#34;application/x-tex\&#34;&gt;E\\left[ R_{i,t} \\right] =R_{i,t}+\\beta _i\\left( E\\left[ R_{m,t} \\right] -R_{i,t} \\right) \n&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=\&#34;katex-html\&#34; aria-hidden=\&#34;true\&#34;&gt;& e=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;m&lt;/span&gt;&lt;span class=\&#34;mpunct mtight\&#34;&gt;,&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.286108em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mclose delimcenter\&#34; style=\&#34;top:0em;\&#34;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.972108em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mclose nulldelimiter\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;证券收益和市场收益的协方差除以市场收益的方差&lt;/p&gt;\n&lt;h2 id=\&#34;估计贝塔\&#34;&gt;估计贝塔&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;估计贝塔的方法有不同种，都基于超额收益对市场组合超额收益的回归展开，最常用的方法是运行一个CAPM回归，这个回归也称作单因子市场模型回归&lt;/p&gt;\n&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=\&#34;katex-display\&#34;&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;msub&gt;&lt;mi&gt;r&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;α&lt;/mi&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;/msub&gt;&lt;mo&gt;+&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;β&lt;/mi&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;/msub&gt;&lt;mi&gt;M&lt;/mi&gt;&lt;mi&gt;K&lt;/mi&gt;&lt;mi&gt;T&lt;/mi&gt;&lt;mo&gt;+&lt;/mo&gt;&lt;msub&gt;&lt;mi&gt;ε&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;i&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;/mrow&gt;&lt;annotation encoding=\&#34;application/x-tex\&#34;&gt;r_{i,t}=\\alpha _i+\\beta _iMKT+\\varepsilon _{i,t}\n&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=\&#34;katex-html\&#34; aria-hidden=\&#34;true\&#34;&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.716668em;vertical-align:-0.286108em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.02778em;\&#34;&gt;r&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.311664em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:-0.02778em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;i&lt;/span&gt;&lt;span class=\&#34;mpunct mtight\&#34;&gt;,&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.286108em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mrel\&#34;&gt;=&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.73333em;vertical-align:-0.15em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.0037em;\&#34;&gt;α&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.31166399999999994em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:-0.0037em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;i&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mbin\&#34;&gt;+&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.8888799999999999em;vertical-align:-0.19444em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.05278em;\&#34;&gt;β&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.31166399999999994em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:-0.05278em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;i&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.07153em;\&#34;&gt;K&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.13889em;\&#34;&gt;T&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mbin\&#34;&gt;+&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.716668em;vertical-align:-0.286108em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;ε&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.311664em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:0em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;i&lt;/span&gt;&lt;span class=\&#34;mpunct mtight\&#34;&gt;,&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.286108em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;其中r是股票i在时段t内的&lt;strong&gt;超额收益&lt;/strong&gt;，MKT是市场组合(市场因子)在时段t内的超额收益，ε是回归残差。如果α为0，两边取期望则得到CAPM，股票市场β则可以看作回归结果中斜率系数的估计值&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;估计市场β可以采用不同的数据频率和周期，常用的方法是&lt;strong&gt;一年的日度超额收益&lt;/strong&gt;估计上式（t-11到t共12个月日度数据），这种情况下至少需要200个数据点。如果采用月度数据，常用过去5年的月度超额收益。&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;测量周期变长，贝塔估计值的标准差变小（异常值影响变小），意味着可能接近贝塔的真实值；此外，更多的数据点导致样本偏向更大更成熟的公司；最后，较长周期测量测量间的相关系数更大（短周期噪声更大）&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;贝塔和股票收益\&#34;&gt;贝塔和股票收益&lt;/h2&gt;\n&lt;p&gt;根据CAPM的预测，市场贝塔和股票期望收益之间存在正相关关系，且这个斜率表示市场风险溢价。而在Bali书中对美股的实证检验中没有得出上述结论——组合分析，回归分析都&lt;strong&gt;没有&lt;/strong&gt;检测到贝塔和未来收益的显著关系，那么对于A股情况如何呢？接下来为A股对贝塔的实证检验：&lt;/p&gt;\n&lt;h3 id=\&#34;1组合分析\&#34;&gt;1.组合分析&lt;/h3&gt;\n&lt;p&gt;以贝塔为排序变量研究单变量排序组合，结果如表8.1所示&lt;br&gt;\n&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613637269014.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;结果表明，无论以市值加权或等权重计算收益，所有十分位上都没有呈现出明显的单调性，但平均收益最低的总是第10分位组合（与CAPM矛盾）；高减低组合的平均收益率均为负数；采用市值加权计算时，贝塔和股票收益负向关系更弱（表现在高减低组合的平均收益率绝对值更低，显著性更低）；以上结论与Bali的美股实证几乎一致，我们没有发现贝塔和期望收益的正相关关系，而是恰恰相反。&lt;/p&gt;\n&lt;h3 id=\&#34;2fm回归\&#34;&gt;2.FM回归&lt;/h3&gt;\n&lt;p&gt;接下来采用FM回归分析研究贝塔和股票收益关系，每个月对每种贝塔进行测量，用未来一个月股票超额收益对贝塔横截面回归，结果由pandas库describe()方法导出，如表8.2所示：&lt;br&gt;\n&lt;img src=\&#34;https://dorianhung.github.io/post-images/1613637275533.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;结果表明，贝塔的平均系数为负数（Newey West调整T统计量为-1.98，在5%水平下显著），与CAPM的预测矛盾，此外回归得到截距系数非常大，与CAPM的第二个预测即零贝塔证券期望超额收益为零矛盾；考虑经济意义，用平均斜率系数-1.02乘以标准差5.10得到-5.20，β每增加一个标准差期望收益每月减少5.20%，数值经济上有意义。&lt;/p&gt;\n&lt;p&gt;与CAPM矛盾的实证检测结果是最持久且最被广泛研究的异象，对此Bali在书中提到的解释有：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;机构投资者基准行为引起（Baker、Bradley和Wurgler 2011）&lt;/li&gt;\n&lt;li&gt;受杠杆约束投资者会买多高β股票以增加组合期望收益，结果是高贝塔股票价格升高从而降低期望收益（Frazzini和Pedersen 2014）&lt;/li&gt;\n&lt;li&gt;投资者对博彩型股票的需求，这些股票恰好是高贝塔股票，结果使高贝塔股票价格升高从而降低期望收益（Bali、Brown、Murray和Tang 2014）&lt;/li&gt;\n&lt;/ul&gt;\n&#34;,&#34;fileName&#34;:&#34;shi-zheng-zi-chan-ding-jie-er-bei-ta&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;实证资产定价(二)贝塔&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-02-12 22:17:53&#34;,&#34;dateFormat&#34;:&#34;2021-02-12&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://dorianhung.github.io/post/shi-zheng-zi-chan-ding-jie-er-bei-ta/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;5 min read&#34;,&#34;time&#34;:257000,&#34;words&#34;:1144,&#34;minutes&#34;:5},&#34;description&#34;:&#34;第八章 贝塔\n根据CAPM，任一证券的期望收益率等于无风险证券收益加上证券市场β乘以市场风险溢价。用数学表示CAPM为：\nE[Ri,t]=Ri,t+βi(E[Rm,t]−Ri,t)E\\left[ R_{i,t} \\right] =R_{i,...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E5%85%AB%E7%AB%A0-%E8%B4%9D%E5%A1%94\&#34;&gt;第八章 贝塔&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BC%B0%E8%AE%A1%E8%B4%9D%E5%A1%94\&#34;&gt;估计贝塔&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%B4%9D%E5%A1%94%E5%92%8C%E8%82%A1%E7%A5%A8%E6%94%B6%E7%9B%8A\&#34;&gt;贝塔和股票收益&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#1%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;1.组合分析&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#2fm%E5%9B%9E%E5%BD%92\&#34;&gt;2.FM回归&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;本系列是基于《Empirical Asset Pricing》及《因子投资方法与实践》的读书笔记集合，旨在加深对实证资产定价的方法论的理解并尝试运用书中于A股实证检验。本篇将简要实证资产的预备知识，对应Empirical Asset Pricing的前七章内容。&lt;/p&gt;\n&lt;h3 id=\&#34;11样本\&#34;&gt;1.1样本&lt;/h3&gt;\n&lt;p&gt;“在这本书中所用到的每一个统计方法都是基于面板数据的，面板中的每一条都反映了一个个体和时间的组合“&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;个体（指股票）用i来表示，时间用t（年，月等）表示；&lt;/li&gt;\n&lt;li&gt;后文针对A股实证部分，股票收益率，账面价值等数据来自JoinQuant.com，无风险收益率等来自石川的factorwar.com&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;12缩尾和截尾\&#34;&gt;1.2缩尾和截尾&lt;/h3&gt;\n&lt;p&gt;为了排除极端数据对结果的影响通常会对其进行处理，常用的方法有如下两种：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;缩尾：高于或低于某特定百分位的极端值被赋值为该特定百分位的值。如取h=l=0.5%，则99.5百分位数和0.5百分位数以外的数字被赋值为百分位对应的数。&lt;br&gt;\n-截尾：百分位数外的数据设定为缺失（舍去）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;13newey-west调整\&#34;&gt;1.3Newey West调整&lt;/h3&gt;\n&lt;p&gt;经典线性模型假设随机扰动项独立，同方差，但在广义线性回归中，这两个假设均可以被打破从而得到两个常见的特性：异方差和自相关。&lt;br&gt;\n对此Newey和West（1987）提出了方法来解决异方差和自相关性对P值或T统计量的影响&lt;br&gt;\nNewey和West调整所需要唯一的变量输入是调整时用到的滞后期数，计量经济学软件通常设定滞后期为4(T/100)^a ，T是时间序列时段的个数，a=2/9或4/25&lt;/p&gt;\n&lt;h2 id=\&#34;第二章-描述性统计\&#34;&gt;第二章---描述性统计&lt;/h2&gt;\n&lt;p&gt;大部分实证研究文章会在讨论结果之前对数据进行描述性统计 ，目标是对所使用的数据和样本特征有一个全面扼要的了解&lt;/p&gt;\n&lt;h3 id=\&#34;21-实施步骤\&#34;&gt;2.1 实施步骤&lt;/h3&gt;\n&lt;p&gt;描述性统计由两步组成&lt;br&gt;\n1、对每一个时段t，计算给定变量X分布特征&lt;br&gt;\n2、计算周期横截面特征的时间序列特征（大部分情况是均值，对样本所有时段t求平均）&lt;/p&gt;\n&lt;p&gt;&lt;code&gt;df.describe()&lt;/code&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;第三章-相关性\&#34;&gt;第三章---相关性&lt;/h2&gt;\n&lt;p&gt;相关性对变量之间的关系给出了明示，除了展现变量的描述性统计研究者通常还会展示主要变量之间的相关性&lt;/p&gt;\n&lt;h3 id=\&#34;31实施步骤\&#34;&gt;3.1实施步骤&lt;/h3&gt;\n&lt;p&gt;相关系数的步骤为两步：&lt;br&gt;\n1、对每个时段t计算两个变量X，Y横截面相关系数；&lt;br&gt;\n2、计算横截面相关系数的时间序列平均值&lt;/p&gt;\n&lt;h4 id=\&#34;311期间横截面相关系数\&#34;&gt;3.1.1期间横截面相关系数&lt;/h4&gt;\n&lt;p&gt;①pearson积矩相关系数：线性关系强度&lt;/p&gt;\n&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=\&#34;katex-display\&#34;&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;msub&gt;&lt;mi&gt;ρ&lt;/mi&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/msub&gt;&lt;mrow&gt;&lt;mo fence=\&#34;true\&#34;&gt;(&lt;/mo&gt;&lt;mi&gt;X&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;Y&lt;/mi&gt;&lt;mo fence=\&#34;true\&#34;&gt;)&lt;/mo&gt;&lt;/mrow&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mfrac&gt;&l ord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.0448em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.24575599999999992em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mbin\&#34;&gt;−&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;1&lt;/span&gt;&lt;span class=\&#34;mclose delimcenter\&#34; style=\&#34;top:0em;\&#34;&gt;)&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.23em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;frac-line\&#34; style=\&#34;border-bottom-width:0.04em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.6769999999999996em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord\&#34;&gt;6&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathit\&#34;&gt;Σ&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.746292em;\&#34;&gt;&lt;span style=\&#34;top:-2.4231360000000004em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;i&lt;/span&gt;&lt;span class=\&#34;mrel mtight\&#34;&gt;=&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;1&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.1449000000000003em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;n&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.29634285714285713em;\&#34;&gt;&lt;span style=\&#34;top:-2.357em;margin-left:0em;margin-right:0.07142857142857144em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.5em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size3 size1 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.143em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.276864em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;d&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.8141079999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.441336em;margin-left:0em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;i&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.063em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;2&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.258664em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.936em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mclose nulldelimiter\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;p&gt;其中：&lt;/p&gt;\n&lt;p&gt;d&lt;sub&gt;i,t&lt;/sub&gt;  =  x&lt;sub&gt;i,t&lt;/sub&gt; - y&lt;sub&gt;i,t&lt;/sub&gt;&lt;/p&gt;\n&lt;p&gt;注：计算斯皮尔曼等级相关系数时不可进行缩尾处理&lt;/p&gt;\n&lt;h3 id=\&#34;32阐述相关系数\&#34;&gt;3.2阐述相关系数&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;相关性分析能够发现多元统计中潜在问题：两个变量如果高度相关且同作为自变量，则难以区分对因变量影响，导致回归系数中的高标准差&lt;/li&gt;\n&lt;li&gt;如果斯皮尔曼等级相关系数&lt;strong&gt;显著大于&lt;/strong&gt;皮尔逊积矩，说明两个变量是单调的，而非线性&lt;/li&gt;\n&lt;li&gt;反之，则表明一个变量存在一些&lt;strong&gt;极端值&lt;/strong&gt;对皮尔逊积矩产生强烈影响&lt;/li&gt;\n&lt;li&gt;皮尔逊积矩有线性假设，对回归技术的结果如&lt;strong&gt;Fama&amp;amp;MacBeth&lt;/strong&gt;回归分析更具指示性&lt;/li&gt;\n&lt;li&gt;斯皮尔曼等级相关系数基于变量大小顺序，对依赖于等级或排序分析的结果如&lt;strong&gt;组合分析&lt;/strong&gt;更具指示性&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;第四章-持续性分析\&#34;&gt;第四章---持续性分析&lt;/h2&gt;\n&lt;p&gt;很多变量被用来捕获样本元素的持续性特征，这意味着通过给定变量，捕获的元素特征在一定时期内被假定是稳定的，例如β就被认为持续性特征，且通常由历史数据所得。&lt;br&gt;\n持续性分析的基本方法是检验两个&lt;strong&gt;不同时点&lt;/strong&gt;测量的给定变量横截面相关系数，如果相关性高则说明这个变量的持续性高。&lt;/p&gt;\n&lt;h3 id=\&#34;41实施步骤\&#34;&gt;4.1实施步骤&lt;/h3&gt;\n&lt;p&gt;第一步：计算给定变量X在相差多个时段的横截面相关系数&lt;br&gt;\n第二步：计算这些相关系数的时间序列均值&lt;/p&gt;\n&lt;h3 id=\&#34;42解释持续性\&#34;&gt;4.2解释持续性&lt;/h3&gt;\n&lt;p&gt;低或零持续性的原因&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;测量的特征实际上并无持续性&lt;/li&gt;\n&lt;li&gt;用来衡量给定特征的变量并没有很好测出这个特征，这种情况下即使样本中给定特征具有高度横截面持续性但是X没有捕获这个特征的横截面差异&lt;br&gt;\n问题：不能找出持续性不意味持续性不存在，低的ρ可能意味X没有捕获那个特征&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;高的ρ：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;无意捕获了某些持续性特征&lt;br&gt;\n高的ρ表明无论X捕获的是什么特性，他都具有持续性&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;第5章-组合分析\&#34;&gt;第5章---组合分析&lt;/h2&gt;\n&lt;p&gt;组合分析是实证资产定价中广泛使用的方法，目标是检验横截面上两个以及以上变量之间的关系，如变量对股票未来收益的预测能力，或横截面上不同变量之间的关系。&lt;br&gt;\n它的优点是：非参数技术分析，不需要对横截面关系提出假设（例如线性回归要求变量关系是线性的）；&lt;br&gt;\n缺点是难以控制大量变量，而回归分析可以控制大量的自变量&lt;/p&gt;\n&lt;h3 id=\&#34;51单变量组合分析\&#34;&gt;5.1单变量组合分析&lt;/h3&gt;\n&lt;p&gt;步骤共有四个：&lt;br&gt;\n第一步：计算用于分组的断点值&lt;br&gt;\n第二步：利用断点值分组&lt;br&gt;\n第三步：计算每个时间段t内，每个组合结果变量Y的均值&lt;br&gt;\n第四步：检验不同组合中Y的均值变化&lt;/p&gt;\n&lt;h4 id=\&#34;511断点\&#34;&gt;5.1.1断点&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;常用做法是在横截面上用均匀间隔的百分位数端点来进行分组，例如5个组合则断点为样本的20，40，60，80百分位数（分3个组合常用30，70百分位数）&lt;/li&gt;\n&lt;li&gt;对每个时间段t都要形成新的组合&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&#34;512组合形成\&#34;&gt;5.1.2组合形成&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;计算出断点后，它可以用于任何样本集&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&#34;513组合平均值\&#34;&gt;5.1.3组合平均值&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;第三步是计算结果变量Y的均值。许多情况下，会使用某种权重计算方法进行加权平均，常用的权重是市值（市值加权平均值）&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;&lt;strong&gt;例如，在t年底计算每只股票的β，并形成若干个组合，在整个t+1年持有组合不进行交易实现的超额收益作为结果变量Y，在t+1年底t平仓重新计算β以此类推&lt;/strong&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;若结果变量Y或权重不可获得，则在计算均值时应排除&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;除了计算每个组合的Y均值，我们还计算组合之间的差异，对每个时段，定义最高的一个组合和最低的一个组合之间的结果变量的平均值差异为 : Y&lt;sub&gt;diff,t&lt;/sub&gt; =Y&lt;sub&gt;np,t&lt;/sub&gt; -Y&lt;sub&gt;1,t&lt;/sub&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;上式也称为【差异组合的平均值】，这些平均差异值是用于检测排序变量和结果变量在横截面上关系的主要值，也是组合分析的主要目标&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;注：结果用【超额收益】表示&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&#34;514结果总结\&#34;&gt;5.1.4结果总结&lt;/h4&gt;\n&lt;p&gt;组合分析主要目的是确定X和Y之间是否在横截面上存在相关关系，为此我们计算每个组合的结果变量Y在时间序列上的均值&lt;/p&gt;\n&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=\&#34;katex-display\&#34;&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mfrac&gt;&lt;mrow&gt;&lt;msub&gt;&lt;mover accent=\&#34;true\&#34;&gt;&lt;mi&gt;Y&lt;/mi&gt;&lt;mo&gt;ˉ&lt;/mo&gt;&lt;/mover&gt;&lt;mi&gt;k&lt;/mi&gt;&lt;/msub&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;msubsup&gt;&lt;mi&gt;Σ&lt;/mi&gt;&lt;mrow&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;mo&gt;=&lt;/mo&gt;&lt;mn&gt;1&lt;/mn&gt;&lt;/mrow&gt;&lt;mi&gt;T&lt;/mi&gt;&lt;/msubsup&gt;&lt;msub&gt;&lt;mover accent=\&#34;true\&#34;&gt;&lt;mi&gt;Y&lt;/mi&gt;&lt;mo&gt;ˉ&lt;/mo&gt;&lt;/mover&gt;&lt;mrow&gt;&lt;mi&gt;k&lt;/mi&gt;&lt;mo separator=\&#34;true\&#34;&gt;,&lt;/mo&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;/msub&gt;&lt;/mrow&gt;&lt;mi&gt;T&lt;/mi&gt;&lt;/mfrac&gt;&lt;/mrow&gt;&lt;annotation encoding=\&#34;application/x-tex\&#34;&gt;\\frac{\\bar{Y}_k=\\varSigma _{t=1}^{T}\\bar{Y}_{k,t}}{T}\n&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=\&#34;katex-html\&#34; aria-hidden=\&#34;true\&#34;&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:2.204331em;vertical-align:-0.686em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mopen nulldelimiter\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mfrac\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:1.5183309999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.314em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.13889em;\&#34;&gt;T&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.23em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;frac-line\&#34; style=\&#34;border-bottom-width:0.04em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.677em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord accent\&#34;&gt;&lt;span class=\&#34;vlist-t\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.8201099999999999em;\&#34;&gt;&lt;span style=\&#34;top:-3em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.22222em;\&#34;&gt;Y&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.25233em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;accent-body\&#34; style=\&#34;left:-0.25em;\&#34;&gt;ˉ&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.33610799999999996em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.03148em;\&#34;&gt;k&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mrel\&#34;&gt;=&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2777777777777778em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathit\&#34;&gt;Σ&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.8413309999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.4518920000000004em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;span class=\&#34;mrel mtight\&#34;&gt;=&lt;/span&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;1&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.063em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.13889em;\&#34;&gt;T&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.24810799999999997em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord accent\&#34;&gt;&lt;span class=\&#34;vlist-t\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.8201099999999999em;\&#34;&gt;&lt;span style=\&#34;top:-3em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.22222em;\&#34;&gt;Y&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span style=\&#34;top:-3.25233em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:3em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;accent-body\&#34; style=\&#34;left:-0.25em;\&#34;&gt;ˉ&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.3361079999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.03148em;\&#34;&gt;k&lt;/span&gt;&lt;span class=\&#34;mpunct mtight\&#34;&gt;,&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mti \&#34;&gt;&lt;span class=\&#34;mord mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.02778em;\&#34;&gt;O&lt;/span&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.02778em;\&#34;&gt;O&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34; style=\&#34;margin-right:0.10903em;\&#34;&gt;M&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.2805559999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:-0.10903em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mbin\&#34;&gt;+&lt;/span&gt;&lt;span class=\&#34;mspace\&#34; style=\&#34;margin-right:0.2222222222222222em;\&#34;&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.58056em;vertical-align:-0.15em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;mord\&#34;&gt;&lt;span class=\&#34;mord mathdefault\&#34;&gt;ε&lt;/span&gt;&lt;span class=\&#34;msupsub\&#34;&gt;&lt;span class=\&#34;vlist-t vlist-t2\&#34;&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.2805559999999999em;\&#34;&gt;&lt;span style=\&#34;top:-2.5500000000000003em;margin-left:0em;margin-right:0.05em;\&#34;&gt;&lt;span class=\&#34;pstrut\&#34; style=\&#34;height:2.7em;\&#34;&gt;&lt;/span&gt;&lt;span class=\&#34;sizing reset-size6 size3 mtight\&#34;&gt;&lt;span class=\&#34;mord mathdefault mtight\&#34;&gt;t&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-s\&#34;&gt;​&lt;/span&gt;&lt;/span&gt;&lt;span class=\&#34;vlist-r\&#34;&gt;&lt;span class=\&#34;vlist\&#34; style=\&#34;height:0.15em;\&#34;&gt;&lt;span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/span&gt;&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;由于这些用于风险调整的回归都是时间序列回归因此通常需要Newey and West 调整，回归结果是截距，斜率以及相应的标准差，T统计量&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;注：风险模型基于超额收益而不是原始收益进行调整的&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;对np个组合的时间序列平均收益进行分析时，要确保在风险调整的回归中，因变量使用的是【组合超额收益】&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;也因此，组合分析中建议使用股票的超额收益而不是股票的原始收益作为【结果变量Y】&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;52双变量独立排序的组合分析\&#34;&gt;5.2双变量独立排序的组合分析&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;考虑相关性：如果两个排序变量高度正相关，可能导致大量个体分入两个排序值都高/低的组合中&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;53双变量序贯排序的组合分析\&#34;&gt;5.3双变量序贯排序的组合分析&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;第二个排序变量的断点根据第一个排序变量形成的每个组形成&lt;/li&gt;\n&lt;li&gt;在序贯排列中不计算第一个排序变量的平均值差异，因为序贯排列【仅被用作评估第二个排序变量X2和结果变量的关系】，即控制了X1后X2和Y的关系&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;第六章-fama-and-macbeth回归\&#34;&gt;第六章 Fama and MacBeth回归&lt;/h2&gt;\n&lt;h3 id=\&#34;61实施\&#34;&gt;6.1实施&lt;/h3&gt;\n&lt;p&gt;第5章的组合分析是一种非参数方法，但难以包含较多的控制变量，Fama MacBeth(1973，简称FM)是检验变量关系的另一种方法，它对变量间关系做出线性假设，但能够控制大量变量&lt;/p&gt;\n&lt;p&gt;FM回归需要两步：&lt;/p&gt;\n&lt;p&gt;第一步：使用每个时期t的数据，运行被研究的因变量Y对X1，X2等周期性横截面回归，得到【每个自变量每个时期的斜率和截距】&lt;/p&gt;\n&lt;p&gt;第二步：分析每个回归系数的时间序列，判断平均系数是否异于0&lt;/p&gt;\n&lt;h4 id=\&#34;611周期性横截面回归\&#34;&gt;6.1.1周期性横截面回归&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;FM的第一步是以Y为因变量，对自变量进行横截面回归，横截面回归检验方程是：&lt;/p&gt;\n&lt;p&gt;Y&lt;sub&gt;i，t&lt;/sub&gt; = δ&lt;sub&gt;0,t&lt;/sub&gt;  +  δ&lt;sub&gt;1,t&lt;/sub&gt;X1&lt;sub&gt;1,t&lt;/sub&gt; + δ&lt;sub&gt;2,t&lt;/sub&gt;X&lt;sub&gt;2,t&lt;/sub&gt; + ... + 截距项&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;回归结果是截距和斜率系数，每个时期也会产生统计结果如R方，调整R方和回归中观测个数；此外，横截面回归不一定使用OLS（二元因变量可用加权最小二乘法logistic回归等）&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h4 id=\&#34;612平均横截面回归结果\&#34;&gt;6.1.2平均横截面回归结果&lt;/h4&gt;\n&lt;ul&gt;\n&lt;li&gt;FM第二步是计算横截面回归得到的【截距，斜率系数，R方，样本数等】的【时间序列平均值】，并判断平均系数是否显著异于0（需要Newey West调整）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;62对fm回归解释\&#34;&gt;6.2对FM回归解释&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;p&gt;统计上显著的平均斜率系数表给定的X和Y存在横截面关系；当不止一个自变量时，显著性表明了控制了包含在回归检验中其他的自变量的效应后，X和Y之间仍然存在关系&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;如果被研究的系数在一个统计检验中先祖但是加入其他变量后不显著，那么X和Y的关系关系可能可以被加入的变量的线性组合解释；如果包含其他变量后，统计显著性出现那么表明为了检验需要研究变量间的关系，控制其他加新加入的变量带来的效应是必要的&lt;/p&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;理解关系大小的经济意义也非常重要：&lt;br&gt;\nX的变化的经济重要性易于理解时，系数本身的平均大小具有信息量&lt;br&gt;\nX的大小不易理解时，可以采取以下方法：&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;X的一个标准差变化对Y期望值产生的效应：时序平均后的X斜率系数 * X横截面标准差&lt;/li&gt;\n&lt;li&gt;斜率系数 * X横截面分布的两个百分位数之差&lt;/li&gt;\n&lt;li&gt;斜率系数 * 较大X和较小X构成组合的平均差异（类似组合分析）&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;\n&lt;p&gt;斜率系数，即承担一单位风险X获得的溢价的估计值&lt;/p&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;补充\&#34;&gt;补充&lt;/h2&gt;\n&lt;h3 id=\&#34;检验异象\&#34;&gt;检验异象&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;使用异象变量及多因子模型中构造因子的变量同时作为解释变量，以资产（组合或个股，常为个股）超额收益作为被解释变量，每个t进行截面回归，得到异象变量的超额收益（因子收益率），检验时间序列上均值和标准误&lt;/li&gt;\n&lt;li&gt;如果控制因子变量后，异象收益仍然显著则可以认为它获得了多因子模型无法解释的超额收益&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2 id=\&#34;第七章-样本和市场因子\&#34;&gt;第七章 样本和市场因子&lt;/h2&gt;\n&lt;p&gt;为了有效执行实证资产定价研究，深入理解所使用的样本和数据特征十分重要&lt;/p&gt;\n&lt;h3 id=\&#34;股票收益和超额收益\&#34;&gt;股票收益和超额收益&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;退市收益-30%/-100%&lt;/li&gt;\n&lt;li&gt;使用因子模型评估收益时，使用超额收益是非常重要的：无风险利率不是常数，其变动可能影响结果&lt;/li&gt;\n&lt;li&gt;月度收益是预测变量被计算后，下一个月的收益：t表示预测变量计算的月份，则t+1月份为被预测的收益&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;市场因子\&#34;&gt;市场因子&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;市场因子的定义为市场组合的超额收益&lt;/li&gt;\n&lt;li&gt;理论上说市场组合包括所有投资之和，因为难以观测计算，常用替代的算法，如金融证券的组合&lt;/li&gt;\n&lt;li&gt;实证资产定价中将（美国）普通股票市场加权组合的【超额收益】（市场收益减去无风险收益）记为MKT&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3 id=\&#34;capm风险模型\&#34;&gt;CAPM风险模型&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;CAPM是考虑了组合或证券对市场组合的风险暴露后，被用来计算一个组合或者证券的平均异常收益的模型&lt;/li&gt;\n&lt;li&gt;异常收益也称为α，如果α统计上异于0表明组合产生非0超额收益并非由对市场组合的敏感所致&lt;/li&gt;\n&lt;/ul&gt;\n&#34;,&#34;fileName&#34;:&#34;shi-zheng-zi-chan-ding-jie-1-yu-bei-zhi-shi&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;实证资产定价(一)预备知识&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-02-11 23:21:05&#34;,&#34;dateFormat&#34;:&#34;2021-02-11&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://dorianhung.github.io/post/shi-zheng-zi-chan-ding-jie-1-yu-bei-zhi-shi/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;15 min read&#34;,&#34;time&#34;:892000,&#34;words&#34;:4066,&#34;minutes&#34;:15},&#34;description&#34;:&#34;本系列是基于《Empirical Asset Pricing》及《因子投资方法与实践》的读书笔记集合，旨在加深对实证资产定价的方法论的理解并尝试运用书中于A股实证检验。本篇将简要实证资产的预备知识，对应Empirical Asset Pri...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#11%E6%A0%B7%E6%9C%AC\&#34;&gt;1.1样本&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#12%E7%BC%A9%E5%B0%BE%E5%92%8C%E6%88%AA%E5%B0%BE\&#34;&gt;1.2缩尾和截尾&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#13newey-west%E8%B0%83%E6%95%B4\&#34;&gt;1.3Newey West调整&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E4%BA%8C%E7%AB%A0-%E6%8F%8F%E8%BF%B0%E6%80%A7%E7%BB%9F%E8%AE%A1\&#34;&gt;第二章---描述性统计&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#21-%E5%AE%9E%E6%96%BD%E6%AD%A5%E9%AA%A4\&#34;&gt;2.1 实施步骤&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E4%B8%89%E7%AB%A0-%E7%9B%B8%E5%85%B3%E6%80%A7\&#34;&gt;第三章---相关性&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#31%E5%AE%9E%E6%96%BD%E6%AD%A5%E9%AA%A4\&#34;&gt;3.1实施步骤&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#311%E6%9C%9F%E9%97%B4%E6%A8%AA%E6%88%AA%E9%9D%A2%E7%9B%B8%E5%85%B3%E7%B3%BB%E6%95%B0\&#34;&gt;3.1.1期间横截面相关系数&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#32%E9%98%90%E8%BF%B0%E7%9B%B8%E5%85%B3%E7%B3%BB%E6%95%B0\&#34;&gt;3.2阐述相关系数&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E5%9B%9B%E7%AB%A0-%E6%8C%81%E7%BB%AD%E6%80%A7%E5%88%86%E6%9E%90\&#34;&gt;第四章---持续性分析&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#41%E5%AE%9E%E6%96%BD%E6%AD%A5%E9%AA%A4\&#34;&gt;4.1实施步骤&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#42%E8%A7%A3%E9%87%8A%E6%8C%81%E7%BB%AD%E6%80%A7\&#34;&gt;4.2解释持续性&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC5%E7%AB%A0-%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;第5章---组合分析&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#51%E5%8D%95%E5%8F%98%E9%87%8F%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;5.1单变量组合分析&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#511%E6%96%AD%E7%82%B9\&#34;&gt;5.1.1断点&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#512%E7%BB%84%E5%90%88%E5%BD%A2%E6%88%90\&#34;&gt;5.1.2组合形成&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#513%E7%BB%84%E5%90%88%E5%B9%B3%E5%9D%87%E5%80%BC\&#34;&gt;5.1.3组合平均值&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#514%E7%BB%93%E6%9E%9C%E6%80%BB%E7%BB%93\&#34;&gt;5.1.4结果总结&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#515%E7%BB%93%E6%9E%9C%E8%A7%A3%E9%87%8A\&#34;&gt;5.1.5结果解释&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#516%E7%BB%93%E6%9E%9C%E5%B1%95%E7%A4%BA\&#34;&gt;5.1.6结果展示&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#517%E6%94%B6%E7%9B%8A%E5%88%86%E6%9E%90\&#34;&gt;5.1.7收益分析&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#52%E5%8F%8C%E5%8F%98%E9%87%8F%E7%8B%AC%E7%AB%8B%E6%8E%92%E5%BA%8F%E7%9A%84%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;5.2双变量独立排序的组合分析&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#53%E5%8F%8C%E5%8F%98%E9%87%8F%E5%BA%8F%E8%B4%AF%E6%8E%92%E5%BA%8F%E7%9A%84%E7%BB%84%E5%90%88%E5%88%86%E6%9E%90\&#34;&gt;5.3双变量序贯排序的组合分析&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E5%85%AD%E7%AB%A0-fama-and-macbeth%E5%9B%9E%E5%BD%92\&#34;&gt;第六章 Fama and MacBeth回归&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#61%E5%AE%9E%E6%96%BD\&#34;&gt;6.1实施&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#611%E5%91%A8%E6%9C%9F%E6%80%A7%E6%A8%AA%E6%88%AA%E9%9D%A2%E5%9B%9E%E5%BD%92\&#34;&gt;6.1.1周期性横截面回归&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#612%E5%B9%B3%E5%9D%87%E6%A8%AA%E6%88%AA%E9%9D%A2%E5%9B%9E%E5%BD%92%E7%BB%93%E6%9E%9C\&#34;&gt;6.1.2平均横截面回归结果&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#62%E5%AF%B9fm%E5%9B%9E%E5%BD%92%E8%A7%A3%E9%87%8A\&#34;&gt;6.2对FM回归解释&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%A1%A5%E5%85%85\&#34;&gt;补充&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%A3%80%E9%AA%8C%E5%BC%82%E8%B1%A1\&#34;&gt;检验异象&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%AC%AC%E4%B8%83%E7%AB%A0-%E6%A0%B7%E6%9C%AC%E5%92%8C%E5%B8%82%E5%9C%BA%E5%9B%A0%E5%AD%90\&#34;&gt;第七章 样本和市场因子&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E8%82%A1%E7%A5%A8%E6 &gt;&lt;a href=\&#34;https://github.com/getgridea/gridea\&#34;&gt;Github&lt;/a&gt;&lt;br&gt;\n&lt;a href=\&#34;https://gridea.dev/\&#34;&gt;Gridea 主页&lt;/a&gt;&lt;br&gt;\n&lt;a href=\&#34;http://fehey.com/\&#34;&gt;示例网站&lt;/a&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;特性\&#34;&gt;特性👇&lt;/h2&gt;\n&lt;p&gt;📝  你可以使用最酷的 &lt;strong&gt;Markdown&lt;/strong&gt; 语法，进行快速创作&lt;/p&gt;\n&lt;p&gt;🌉  你可以给文章配上精美的封面图和在文章任意位置插入图片&lt;/p&gt;\n&lt;p&gt;🏷️  你可以对文章进行标签分组&lt;/p&gt;\n&lt;p&gt;📋  你可以自定义菜单，甚至可以创建外部链接菜单&lt;/p&gt;\n&lt;p&gt;💻  你可以在 &lt;strong&gt;Windows&lt;/strong&gt;，&lt;strong&gt;MacOS&lt;/strong&gt; 或 &lt;strong&gt;Linux&lt;/strong&gt; 设备上使用此客户端&lt;/p&gt;\n&lt;p&gt;🌎  你可以使用 &lt;strong&gt;𝖦𝗂𝗍𝗁𝗎𝖻 𝖯𝖺𝗀𝖾𝗌&lt;/strong&gt; 或 &lt;strong&gt;Coding Pages&lt;/strong&gt; 向世界展示，未来将支持更多平台&lt;/p&gt;\n&lt;p&gt;💬  你可以进行简单的配置，接入 &lt;a href=\&#34;https://github.com/gitalk/gitalk\&#34;&gt;Gitalk&lt;/a&gt; 或 &lt;a href=\&#34;https://github.com/SukkaW/DisqusJS\&#34;&gt;DisqusJS&lt;/a&gt; 评论系统&lt;/p&gt;\n&lt;p&gt;🇬🇧  你可以使用&lt;strong&gt;中文简体&lt;/strong&gt;或&lt;strong&gt;英语&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;🌁  你可以任意使用应用内默认主题或任意第三方主题，强大的主题自定义能力&lt;/p&gt;\n&lt;p&gt;🖥  你可以自定义源文件夹，利用 OneDrive、百度网盘、iCloud、Dropbox 等进行多设备同步&lt;/p&gt;\n&lt;p&gt;🌱 当然 &lt;strong&gt;Gridea&lt;/strong&gt; 还很年轻，有很多不足，但请相信，它会不停向前 🏃&lt;/p&gt;\n&lt;p&gt;未来，它一定会成为你离不开的伙伴&lt;/p&gt;\n&lt;p&gt;尽情发挥你的才华吧！&lt;/p&gt;\n&lt;p class=&#39;katex-block&#39;&gt;&lt;span class=\&#34;katex-display\&#34;&gt;&lt;span class=\&#34;katex\&#34;&gt;&lt;span class=\&#34;katex-mathml\&#34;&gt;&lt;math&gt;&lt;semantics&gt;&lt;mrow&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;mi&gt;e&lt;/mi&gt;&lt;mi&gt;s&lt;/mi&gt;&lt;mi&gt;t&lt;/mi&gt;&lt;/mrow&gt;&lt;annotation encoding=\&#34;application/x-tex\&#34;&gt;test\n&lt;/annotation&gt;&lt;/semantics&gt;&lt;/math&gt;&lt;/span&gt;&lt;span class=\&#34;katex-html\&#34; aria-hidden=\&#34;true\&#34;&gt;&lt;span class=\&#34;base\&#34;&gt;&lt;span class=\&#34;strut\&#34; style=\&#34;height:0.61508em;vertical-align:0em;\&#34;&gt;&lt;/span&gt;&lt;spa
